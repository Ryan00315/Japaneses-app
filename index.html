<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kingtex JPNote</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card-flip { perspective: 1000px; } .card-inner { transition: transform 0.4s; transform-style: preserve-3d; cursor: pointer; position: relative; }
        .card-inner.is-flipped { transform: rotateY(180deg); } .card-front, .card-back { backface-visibility: hidden; position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 40px; padding: 2rem; pointer-events: none; }
        .card-back { transform: rotateY(180deg); } .sticky-header { z-index: 200; background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(10px); position: sticky; top: 0; }
        .lesson-active, .type-active, .active-new-cat, .active-edit-cat { background-color: #4f46e5 !important; color: white !important; border-color: #4f46e5 !important; }
        .note-active { background-color: #f97316 !important; color: white !important; } .no-scrollbar::-webkit-scrollbar { display: none; }
        #input-section { max-height: 0; opacity: 0; overflow: hidden; transition: all 0.4s ease; } #input-section.show { max-height: 2000px; opacity: 1; margin-bottom: 1.5rem; }
        .modal-overlay { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(4px); } .ls-btn-style { color: #64748b; font-weight: 700; font-size: 11px; border-color: #e2e8f0; white-space: nowrap; }
        #toast { visibility: hidden; min-width: 200px; background: #333; color: #fff; text-align: center; border-radius: 50px; padding: 16px; position: fixed; z-index: 3000; left: 50%; bottom: 100px; transform: translateX(-50%); }
        #toast.show { visibility: visible; animation: fade 2s; } @keyframes fade { 0%,100% {opacity:0} 10%,90% {opacity:1} }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-10 text-slate-900" onclick="window.initAudioOnFirstClick()">
    <div id="toast">✅ 操作成功</div>
    <div class="sticky-header border-b border-slate-200">
        <div class="max-w-md mx-auto px-4 pt-4 pb-2">
            <div class="flex items-center mb-3"><div class="flex items-center gap-1.5 no-scrollbar flex-1 overflow-x-auto" id="user-history-list"></div><button onclick="window.speakAction('こんにちは')" class="ml-2 text-[9px] bg-yellow-400 text-white px-2 py-0.5 rounded-md font-bold">🔈 測試語音</button></div>
            <div class="flex items-center justify-between gap-1"><h1 class="text-lg font-black text-indigo-600 tracking-tighter">Kingtex JPNote</h1><div class="flex items-center gap-1"><button onclick="window.showStatsModal()" class="text-[9px] bg-slate-100 px-2 py-2 rounded-full font-bold">進度</button><button onclick="window.toggleImport(true)" class="text-[9px] bg-slate-100 px-2 py-2 rounded-full font-bold">批量</button><button onclick="window.openQuizSetup()" class="bg-orange-500 text-white px-3 py-1.5 rounded-full text-xs font-bold shadow-lg">隨機測試</button></div></div>
        </div>
        <div class="max-w-md mx-auto px-4 pb-3">
            <div class="flex gap-2 mb-2"><button id="book1-btn" onclick="window.switchBook(1)" class="flex-1 border py-2 rounded-xl text-xs font-bold transition-all">第一冊</button><button id="book2-btn" onclick="window.switchBook(2)" class="flex-1 border py-2 rounded-xl text-xs font-bold transition-all">第二冊</button><button id="book-note-btn" onclick="window.switchBook('note')" class="flex-1 border py-2 rounded-xl text-xs font-bold transition-all">個人筆記</button></div>
            <div class="no-scrollbar pb-2 flex gap-2 overflow-x-auto" id="lesson-filter-container"></div>
            <div id="type-filter" class="no-scrollbar pb-2 flex gap-2 overflow-x-auto"></div>
            <div class="flex gap-2"><input type="text" id="searchInput" oninput="window.renderList()" placeholder="🔍 搜尋..." class="flex-1 p-3 rounded-2xl bg-white border outline-none text-sm shadow-inner"><button id="sort-btn" onclick="window.toggleSort()" class="bg-white border px-4 rounded-2xl text-[11px] font-bold text-slate-600">排序 ↓</button></div>
        </div>
    </div>
    <div class="max-w-md mx-auto p-4">
        <button onclick="document.getElementById('input-section').classList.toggle('show'); window.fixScroll();" class="mb-4 bg-indigo-50 text-indigo-600 px-6 py-2.5 rounded-full text-sm font-bold border border-indigo-100 w-full active:scale-95 shadow-sm">＋ 新增單語</button>
        <section id="input-section" class="bg-white rounded-3xl p-5 border shadow-sm overflow-hidden text-center">
             <div class="grid grid-cols-2 gap-3 mb-4 text-left"><input id="word" type="text" placeholder="單語 (日文)" onkeydown="if(event.key==='Enter') window.autoTranslate()" class="bg-slate-50 p-4 rounded-2xl outline-none text-sm border focus:border-indigo-300"><input id="reading" type="text" placeholder="漢字" class="bg-slate-50 p-4 rounded-2xl outline-none text-sm border focus:border-indigo-300"></div>
            <div class="relative mb-4 text-left"><input id="meaning" type="text" placeholder="中文意思" class="w-full bg-slate-50 p-4 pr-32 rounded-2xl outline-none text-sm border focus:border-indigo-300"><button onclick="window.autoTranslate()" class="absolute right-2 top-2 bottom-2 bg-indigo-600 text-[10px] px-3 rounded-xl font-bold text-white">👉 AI 翻譯</button></div>
            <div class="flex gap-2 mb-3"><button id="new-book1-tab" onclick="window.setNewBookTab(1)" class="flex-1 border py-1.5 rounded-xl text-xs font-bold">第一冊</button><button id="new-book2-tab" onclick="window.setNewBookTab(2)" class="flex-1 border py-1.5 rounded-xl text-xs font-bold">第二冊</button><button id="new-note-tab" onclick="window.setNewBookTab('note')" class="flex-1 border py-1.5 rounded-xl text-xs font-bold">個人筆記</button></div>
            <div id="new-lesson-container" class="no-scrollbar pb-3 mb-2 flex gap-2 overflow-x-auto"></div>
            <div id="new-category-picker" class="flex flex-wrap gap-2 mb-6"></div>
            <button id="submit-btn" onclick="window.submitNewWord()" class="w-3/4 mx-auto bg-slate-900 text-white py-3 rounded-2xl font-bold block text-sm shadow-xl">儲存到單字冊</button>
        </section>
        <ul id="vocab-list" class="space-y-3 mt-4"></ul>
    </div>
    <div id="quiz-overlay" class="fixed inset-0 z-[400] bg-slate-900 hidden flex flex-col items-center justify-center p-6 text-white text-center">
        <div id="quiz-setup" class="w-full max-w-md"><h2 class="text-2xl font-black mb-6 uppercase">隨機測試</h2><div class="flex gap-2 justify-center mb-6"><button id="modeStdBtn" onclick="window.setQuizMode('standard')" class="px-4 py-2 rounded-xl text-sm font-bold bg-indigo-600">單字卡</button><button id="modeHearBtn" onclick="window.setQuizMode('hearing')" class="px-4 py-2 rounded-xl text-sm font-bold bg-slate-700">聽力模式</button></div><button onclick="window.startQuiz()" class="w-full py-6 bg-indigo-600 rounded-3xl mb-4 font-bold text-xl shadow-xl">開始練習</button><button onclick="document.getElementById('quiz-overlay').classList.add('hidden')" class="text-slate-500 font-bold">返回</button></div>
        <div id="quiz-content" class="w-full max-w-md flex flex-col h-full hidden"><div class="flex justify-between items-center mb-6"><span id="quiz-progress-display"></span><button onclick="location.reload()">✕</button></div><div id="quiz-card" class="card-inner flex-1 bg-white text-slate-900 rounded-[40px] p-8 flex flex-col items-center justify-center shadow-2xl"><div id="q-meaning-display" class="text-4xl font-black mb-4"></div><div id="q-answer-display" class="text-xl text-indigo-500 hidden"></div><button id="show-ans-btn" onclick="document.getElementById('q-answer-display').classList.toggle('hidden')" class="mt-4 text-slate-400 text-sm">點擊顯示答案</button></div><button onclick="window.nextQuestion()" class="mt-4 bg-emerald-500 py-6 rounded-3xl font-black shadow-lg">下一個 (→)</button></div>
    </div>
    <div id="edit-modal" class="fixed inset-0 z-[350] modal-overlay hidden flex flex-col items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-[40px] p-8 shadow-2xl overflow-y-auto max-h-[90vh]">
            <h2 class="text-xl font-black mb-6 border-b pb-4 text-center text-indigo-600 uppercase">編輯單語</h2>
            <div class="space-y-4"><input id="edit-word" type="text" class="w-full bg-slate-50 p-3 rounded-xl border outline-none text-sm"><input id="edit-reading" type="text" class="w-full bg-slate-50 p-3 rounded-xl border outline-none text-sm"><input id="edit-meaning" type="text" class="w-full bg-slate-50 p-3 rounded-xl border outline-none text-sm font-bold">
                <div class="flex gap-2"><button onclick="window.setEditBook(1)" id="edit-book1-btn" class="flex-1 border py-1.5 rounded-xl text-sm font-bold">第一冊</button><button onclick="window.setEditBook(2)" id="edit-book2-btn" class="flex-1 border py-1.5 rounded-xl text-sm font-bold">第二冊</button><button onclick="window.setEditBook('note')" id="edit-book-note-btn" class="flex-1 border py-1.5 rounded-xl text-sm font-bold">個人筆記</button></div>
                <div id="edit-lesson-container" class="no-scrollbar pb-3 flex gap-2 overflow-x-auto"></div><div id="edit-category-picker" class="flex flex-wrap gap-2"></div><div class="flex gap-3 pt-4 border-t mt-4"><button onclick="document.getElementById('edit-modal').classList.add('hidden')" class="flex-1 bg-slate-100 py-3 rounded-2xl font-bold">取消</button><button onclick="window.saveWordEdit()" class="flex-1 bg-indigo-600 text-white py-3 rounded-2xl font-bold">更新保存</button></div>
            </div>
        </div>
    </div>
    <div id="stats-modal" class="fixed inset-0 z-[450] modal-overlay hidden flex flex-col items-center justify-center p-4"><div class="bg-white w-full max-w-md rounded-[40px] p-8 shadow-2xl overflow-y-auto max-h-[80vh] text-center"><h2 class="text-xl font-black mb-4 text-indigo-600 uppercase">弱點排行</h2><div id="devil-list" class="space-y-2 p-2"></div><button onclick="window.toggleStats(false)" class="w-full mt-6 bg-slate-100 py-3 rounded-2xl font-bold">關閉</button></div></div>
    <div id="import-overlay" class="fixed inset-0 z-[500] bg-slate-900 hidden flex flex-col items-center justify-center p-6 text-white"><div class="w-full max-w-md"><h3 class="text-xl font-bold mb-4 uppercase">批量匯入</h3><textarea id="import-text" rows="8" class="w-full bg-slate-800 rounded-2xl p-4 text-sm outline-none mb-4" placeholder="單語,漢字,意思"></textarea><div class="flex gap-2"><button onclick="window.toggleImport(false)" class="flex-1 bg-slate-700 py-3 rounded-xl font-bold">取消</button><button onclick="window.startImport()" class="flex-1 bg-indigo-500 py-3 rounded-xl font-bold">匯入</button></div></div></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, query, orderBy, where, setDoc, deleteDoc, writeBatch } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        const firebaseConfig = { apiKey: "AIzaSyDOsqjX7FknZOKTdEUiofhIwIwGVRUIdN4", authDomain: "jpnote-5f436.firebaseapp.com", projectId: "jpnote-5f436", storageBucket: "jpnote-5f436.firebasestorage.app", messagingSenderId: "881660892658", appId: "1:881660892658:web:9d88f9b2332aa9e2b3076b", measurementId: "G-QV2NRXQSY7" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app); const vocabsCol = collection(db, "vocabs"); const progressCol = collection(db, "user_progress");
        const GEMINI_KEY = "AIzaSyDb7BA3Ikwz33KKjJgrzrc1afHIoGj7q94";
        window.vocabs = []; window.userProgress = {}; window.selectedLessons = []; window.selectedTypes = [];
        window.currentBook = 1; window.newWordBook = 1; window.selectedNewCat = 'n.'; window.selectedNewLesson = '未分類'; window.quizMode = 'standard';
        let currentUser = localStorage.getItem('jp_user_shared') || '訪客';
        let userHistory = JSON.parse(localStorage.getItem('jp_user_history') || '["訪客"]');
        const BOOK_MAP = { 1: ["附錄", "未分類", "L1", "L2", "L3", "L4", "L5", "L6", "L7", "L8", "L9", "L10", "L11", "L12"], 2: ["L13", "L14", "L15", "L16", "L17", "L18", "L19", "L20", "L21", "L22", "L23", "L24", "L25"] };

        // --- AI 翻譯核心 ---
        window.autoTranslate = async () => {
            const w = document.getElementById('word').value.trim(); if(!w) return; window.showToast("⏳ AI 翻譯中...");
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`, {
                    method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ contents: [{ parts: [{ text: `Translate "${w}". 回傳 JSON: {"k":"漢字","m":"中文"}. 日期時間用數字. 僅回傳 JSON.` }] }] })
                });
                const data = await res.json(); const aiTxt = data.candidates[0].content.parts[0].text;
                const result = JSON.parse(aiTxt.match(/\{.*\}/s)[0]);
                document.getElementById('reading').value = result.k || ""; document.getElementById('meaning').value = result.m || "";
                window.showToast("✅ 成功");
            } catch(e) { window.showToast("❌ 失敗"); }
        };

        // --- UI 控制 ---
        window.switchBook = (b) => { window.currentBook = b; window.selectedLessons = (b==='note'?['個人筆記']:[]); window.renderLessonUI(); window.renderTypeUI(); window.renderList(); };
        window.renderLessonUI = () => {
            const c = document.getElementById('lesson-filter-container');
            document.getElementById('book1-btn').className = `flex-1 border py-2 rounded-xl text-xs font-bold ${window.currentBook===1?'lesson-active':'bg-white'}`;
            document.getElementById('book2-btn').className = `flex-1 border py-2 rounded-xl text-xs font-bold ${window.currentBook===2?'lesson-active':'bg-white'}`;
            document.getElementById('book-note-btn').className = `flex-1 border py-2 rounded-xl text-xs font-bold ${window.currentBook==='note'?'note-active':'bg-white'}`;
            if (window.currentBook==='note') c.innerHTML=""; else c.innerHTML = BOOK_MAP[window.currentBook].map(l => `<button onclick="window.toggleLesson('${l}')" class="ls-btn-style border px-4 py-1 rounded-lg ${window.selectedLessons.includes(l)?'lesson-active':'bg-white'}">${l}</button>`).join('');
        };
        window.toggleLesson = (l) => { const i = window.selectedLessons.indexOf(l); if(i>-1) window.selectedLessons.splice(i,1); else window.selectedLessons.push(l); window.renderLessonUI(); window.renderList(); };
        window.renderTypeUI = () => {
            const container = document.getElementById('type-filter'); const types = window.selectedLessons.includes('附錄') ? ['數字', '時間', '量詞'] : ['n.', 'v.', 'adj.', '其他'];
            container.innerHTML = types.map(t => `<button onclick="window.selectedTypes.includes('${t}')?window.selectedTypes.splice(window.selectedTypes.indexOf('${t}'),1):window.selectedTypes.push('${t}');window.renderTypeUI();window.renderList();" class="ls-btn-style border px-3 py-1 rounded-lg ${window.selectedTypes.includes(t)?'type-active':'bg-white'}">${t}</button>`).join('');
        };
        window.setNewBookTab = (b) => { window.newWordBook = b; window.selectedNewLesson = (b==='note'?'個人筆記':'L1'); window.renderNewLessonUI(); window.renderNewCategoryUI(); };
        window.renderNewLessonUI = () => {
            document.getElementById('new-book1-tab').className = `flex-1 border py-1.5 rounded-xl text-xs font-bold ${window.newWordBook===1?'lesson-active':'bg-white'}`;
            document.getElementById('new-book2-tab').className = `flex-1 border py-1.5 rounded-xl text-xs font-bold ${window.newWordBook===2?'lesson-active':'bg-white'}`;
            document.getElementById('new-note-tab').className = `flex-1 border py-1.5 rounded-xl text-xs font-bold ${window.newWordBook==='note'?'note-active text-white':'bg-white'}`;
            const c = document.getElementById('new-lesson-container'); if(window.newWordBook==='note') c.innerHTML=""; else c.innerHTML = BOOK_MAP[window.newWordBook].map(l => `<button onclick="window.selectedNewLesson='${l}';window.renderNewLessonUI();window.renderNewCategoryUI();" class="ls-btn-style border px-4 py-1 rounded-lg ${window.selectedNewLesson===l?'active-new-cat':'bg-white'}">${l}</button>`).join('');
        };
        window.renderNewCategoryUI = () => { const types = window.selectedNewLesson==='附錄'?['數字','時間','量詞']:['n.','v.','adj.','其他']; document.getElementById('new-category-picker').innerHTML = types.map(t => `<button onclick="window.selectedNewCat='${t}';window.renderNewCategoryUI();" class="ls-btn-style border px-3 py-1 rounded-lg ${window.selectedNewCat===t?'active-new-cat':'bg-white'}">${t}</button>`).join(''); };
        window.setEditBook = (b) => { window.editWordBook = b; window.selectedEditLesson = (b==='note'?'個人筆記':'L1'); window.renderEditLessonUI(); window.renderEditCategoryUI(); };
        window.renderEditLessonUI = () => {
            const c = document.getElementById('edit-lesson-container');
            document.getElementById('edit-book1-btn').className = `flex-1 border py-1.5 rounded-xl text-sm font-bold ${window.editWordBook===1?'lesson-active':'bg-white'}`;
            document.getElementById('edit-book2-btn').className = `flex-1 border py-1.5 rounded-xl text-sm font-bold ${window.editWordBook===2?'lesson-active':'bg-white'}`;
            document.getElementById('edit-book-note-btn').className = `flex-1 border py-1.5 rounded-xl text-sm font-bold ${window.editWordBook==='note'?'note-active text-white':'bg-white'}`;
            if(window.editWordBook==='note') c.innerHTML=""; else c.innerHTML = BOOK_MAP[window.editWordBook].map(l => `<button onclick="window.selectedEditLesson='${l}';window.renderEditLessonUI();window.renderEditCategoryUI();" class="ls-btn-style border px-4 py-1 rounded-lg ${window.selectedEditLesson===l?'active-edit-cat':'bg-white'}">${l}</button>`).join('');
        };
        window.renderEditCategoryUI = () => { const types = window.selectedEditLesson==='附錄'?['數字','時間']:['n.','v.','adj.','其他']; document.getElementById('edit-category-picker').innerHTML = types.map(t => `<button onclick="window.selectedEditCat='${t}';window.renderEditCategoryUI();" class="ls-btn-style border px-3 py-1 rounded-lg ${window.selectedEditCat===t?'active-edit-cat':'bg-white'}">${t}</button>`).join(''); };
        window.openEditAction = (id) => { const v = window.vocabs.find(x => x.id === id); if(!v) return; window.currentEditId = id; document.getElementById('edit-word').value = v.word; document.getElementById('edit-reading').value = v.reading||""; document.getElementById('edit-meaning').value = v.meaning; window.editWordBook = 1; window.selectedEditLesson = v.lesson; window.selectedEditCat = v.category||'n.'; window.renderEditLessonUI(); window.renderEditCategoryUI(); document.getElementById('edit-modal').classList.remove('hidden'); };
        window.saveWordEdit = async () => { const data = { word: document.getElementById('edit-word').value, reading: document.getElementById('edit-reading').value, meaning: document.getElementById('edit-meaning').value, lesson: window.selectedEditLesson, category: window.selectedEditCat }; await updateDoc(doc(db,"vocabs",window.currentEditId), data); document.getElementById('edit-modal').classList.add('hidden'); window.showToast("✅ 更新完成"); };
        window.renderList = () => {
            const s = document.getElementById('searchInput').value.toLowerCase();
            const filtered = window.vocabs.filter(v => (v.lesson==='個人筆記'?v.uid===currentUser:!v.uid) && (window.selectedLessons.length===0 || window.selectedLessons.includes(v.lesson)) && (window.selectedTypes.length===0 || window.selectedTypes.includes(v.category)) && (s==="" || v.word.toLowerCase().includes(s) || v.meaning.toLowerCase().includes(s)));
            document.getElementById('vocab-list').innerHTML = filtered.map(v => `<li class="bg-white p-5 rounded-[32px] flex justify-between items-center shadow-sm border border-slate-100"><div class="flex-1 text-left"><div class="flex gap-1.5 mb-1"><span class="bg-indigo-50 text-indigo-500 px-2 py-0.5 rounded-md text-[9px] uppercase font-black">${v.lesson}</span><span class="bg-pink-50 text-pink-500 px-2 py-0.5 rounded-md text-[9px] uppercase font-black">${v.category||'n.'}</span></div><div class="text-xl font-bold">${v.word}${v.reading?`<span class="text-xs text-slate-400 ml-1">【${v.reading}】</span>`:''}</div><div class="text-slate-500 text-xs mt-1 font-bold">${v.meaning}</div></div><div class="flex gap-1"><button onclick="window.speakAction('${v.word}')" class="w-10 h-10 bg-indigo-50 text-indigo-600 rounded-full text-xl">🔊</button><button onclick="window.openEditAction('${v.id}')" class="w-10 h-10 bg-blue-50 text-blue-500 rounded-full text-sm">✏️</button><button onclick="window.deleteWord('${v.id}')" class="w-10 h-10 text-slate-200">✕</button></div></li>`).join('');
        };
        window.submitNewWord = async () => { const w = document.getElementById('word').value.trim(), r = document.getElementById('reading').value.trim(), m = document.getElementById('meaning').value.trim(); if (!w || !m) return alert("不完整"); const data = { word: w, reading: r, meaning: m, lesson: window.selectedNewLesson, category: window.selectedNewCat, createdAt: new Date() }; if (window.selectedNewLesson==='個人筆記') data.uid = currentUser; await addDoc(vocabsCol, data); document.getElementById('word').value = ""; document.getElementById('reading').value = ""; document.getElementById('meaning').value = ""; window.showToast("✅ 儲存成功"); };
        window.deleteWord = async (id) => { if(confirm("確定刪除？")) await deleteDoc(doc(vocabsCol, id)); };
        window.openQuizSetup = () => document.getElementById('quiz-overlay').classList.remove('hidden');
        window.setQuizMode = (m) => { window.quizMode = m; document.getElementById('modeStdBtn').className = `px-4 py-2 rounded-xl text-sm font-bold ${m==='standard'?'bg-indigo-600':'bg-slate-700'}`; document.getElementById('modeHearBtn').className = `px-4 py-2 rounded-xl text-sm font-bold ${m==='hearing'?'bg-indigo-600':'bg-slate-700'}`; };
        window.startQuiz = () => { window.remainingPool = [...window.vocabs].sort(()=>Math.random()-0.5).slice(0,10); document.getElementById('quiz-setup').classList.add('hidden'); document.getElementById('quiz-content').classList.remove('hidden'); window.nextQuestion(); };
        window.nextQuestion = () => { if(!window.remainingPool.length) return location.reload(); window.currentQuizWord = window.remainingPool.shift(); document.getElementById('q-meaning-display').innerText = window.currentQuizWord.meaning; document.getElementById('q-answer-display').innerText = window.currentQuizWord.word; document.getElementById('q-answer-display').classList.add('hidden'); };
        window.showStatsModal = () => document.getElementById('stats-modal').classList.remove('hidden');
        window.toggleStats = (s) => document.getElementById('stats-modal').classList.toggle('hidden', !s);
        window.toggleImport = (s) => document.getElementById('import-overlay').classList.toggle('hidden', !s);
        window.showToast = (m) => { const t = document.getElementById("toast"); t.innerText = m; t.classList.add("show"); setTimeout(() => t.classList.remove("show"), 2000); };
        window.speakAction = (t) => { window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(t); u.lang='ja-JP'; u.rate=0.5; window.speechSynthesis.speak(u); };
        window.fixScroll = () => { setTimeout(() => { const s = document.getElementById('input-section'); if(s.classList.contains('show')) window.scrollTo({ top: s.offsetTop - 280, behavior: 'smooth' }); }, 300); };
        window.renderUserHistory = () => { document.getElementById('user-history-list').innerHTML = userHistory.map(name => `<button onclick="localStorage.setItem('jp_user_shared', '${name}'); location.reload();" class="text-[10px] px-2.5 py-0.5 rounded-full font-bold border ${name === currentUser ? 'bg-indigo-600 text-white' : 'bg-white'}">${name}</button>`).join(''); };
        window.initAudioOnFirstClick = () => { window.speechSynthesis.speak(new SpeechSynthesisUtterance(" ")); };
        onSnapshot(query(vocabsCol, orderBy("createdAt", "desc")), (snap) => { window.vocabs = snap.docs.map(d => ({id:d.id, ...d.data()})); window.renderList(); });
        window.renderUserHistory(); window.switchBook(1); window.renderNewLessonUI(); window.renderNewCategoryUI();
    </script>
</body>
</html>
