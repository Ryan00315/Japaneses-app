<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kingtex JPNote</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card-flip { perspective: 1000px; height: 100%; width: 100%; }
        .card-inner { transition: transform 0.4s; transform-style: preserve-3d; cursor: pointer; height: 100%; width: 100%; position: relative; }
        .card-inner.is-flipped { transform: rotateY(180deg); }
        .card-front, .card-back { backface-visibility: hidden; position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 40px; padding: 2rem; pointer-events: none; }
        .card-back { transform: rotateY(180deg); }
        .sticky-header { z-index: 200 !important; background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(10px); position: sticky; top: 0; }
        .lesson-active, .type-active, .active-new-cat { background-color: #4f46e5 !important; color: white !important; border-color: #4f46e5 !important; }
        .note-active { background-color: #f97316 !important; color: white !important; border-color: #f97316 !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { overflow-x: auto; display: flex; gap: 0.5rem; scrollbar-width: none; }
        #input-section { max-height: 0; opacity: 0; overflow: hidden; transition: all 0.4s ease; }
        #input-section.show { max-height: 2000px; opacity: 1; margin-bottom: 1.5rem; }
        .ls-btn-style { color: #64748b; font-weight: 700; font-size: 11px; border-color: #e2e8f0; white-space: nowrap; flex-shrink: 0; }
        #toast { visibility: hidden; min-width: 200px; background-color: #333; color: #fff; text-align: center; border-radius: 50px; padding: 16px; position: fixed; z-index: 1000; left: 50%; bottom: 100px; transform: translateX(-50%); font-weight: bold; }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 1.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 100px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 100px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-10" onclick="window.initAudioOnFirstClick()">

    <div id="toast">✅ 操作成功</div>

    <div class="sticky-header border-b border-slate-200">
        <div class="max-w-md mx-auto px-4 pt-4 pb-2">
            <div class="flex items-center mb-3">
                <div class="flex items-center gap-1.5 no-scrollbar flex-1" id="user-history-list"></div>
                <button onclick="window.speakAction('こんにちは')" class="ml-2 text-[9px] bg-yellow-400 text-white px-2 py-0.5 rounded-md font-bold">🔈 語音測試</button>
            </div>
            <div class="flex items-center justify-between">
                <h1 class="text-lg font-black text-indigo-600 tracking-tighter">Kingtex JPNote</h1>
                <div class="flex gap-1">
                    <button onclick="window.showStatsModal()" class="text-[9px] bg-slate-100 px-2 py-2 rounded-full font-bold">進度</button>
                    <button onclick="window.toggleImport(true)" class="text-[9px] bg-slate-100 px-2 py-2 rounded-full font-bold">批量</button>
                    <button onclick="window.openQuizSetup()" class="bg-orange-500 text-white px-3 py-1.5 rounded-full text-xs font-bold shadow-lg">隨機測試</button>
                </div>
            </div>
        </div>
        <div class="max-w-md mx-auto px-4 pb-3">
            <div class="flex gap-2 mb-2">
                <button id="book1-btn" onclick="window.switchBook(1)" class="flex-1 border py-2 rounded-xl text-xs font-bold transition-all">第一冊</button>
                <button id="book2-btn" onclick="window.switchBook(2)" class="flex-1 border py-2 rounded-xl text-xs font-bold transition-all">第二冊</button>
                <button id="book-note-btn" onclick="window.switchBook('note')" class="flex-1 border py-2 rounded-xl text-xs font-bold transition-all">個人筆記</button>
            </div>
            <div class="no-scrollbar pb-2" id="lesson-filter-container"></div>
            <div id="type-filter" class="no-scrollbar pb-2"></div>
            <div class="flex gap-2">
                <input type="text" id="searchInput" oninput="window.renderList()" placeholder="🔍 搜尋..." class="flex-1 p-3 rounded-2xl bg-white border outline-none text-sm shadow-inner">
                <button id="sort-btn" onclick="window.toggleSort()" class="bg-white border px-4 rounded-2xl text-[11px] font-bold text-slate-600">排序 ↓</button>
            </div>
        </div>
    </div>

    <div class="max-w-md mx-auto p-4">
        <button onclick="document.getElementById('input-section').classList.toggle('show');" class="mb-4 bg-indigo-50 text-indigo-600 px-6 py-2.5 rounded-full text-sm font-bold border border-indigo-100 w-full shadow-sm">＋ 新增單語</button>
        
        <section id="input-section" class="bg-white rounded-3xl p-5 border shadow-sm transition-all overflow-hidden text-center">
             <div class="grid grid-cols-2 gap-3 mb-4 text-left">
                <input id="word" type="text" placeholder="單語 (日文)" 
                       onblur="window.autoTranslate()" 
                       onkeydown="if(event.key==='Enter') { window.autoTranslate(); }" 
                       class="bg-slate-50 p-4 rounded-2xl outline-none text-sm border focus:border-indigo-300">
                <input id="reading" type="text" placeholder="漢字" class="bg-slate-50 p-4 rounded-2xl outline-none text-sm border focus:border-indigo-300">
            </div>
            <div class="relative mb-4 text-left">
                <input id="meaning" type="text" placeholder="中文意思" class="w-full bg-slate-50 p-4 pr-36 rounded-2xl outline-none text-sm border focus:border-indigo-300">
                <button type="button" onclick="window.autoTranslate()" class="absolute right-2 top-2 bottom-2 bg-white text-[10px] px-2 rounded-xl border font-bold text-slate-500">👉 翻譯</button>
            </div>
            <div class="flex gap-2 mb-3">
                <button id="new-book1-tab" onclick="window.setNewBookTab(1)" class="flex-1 border py-1.5 rounded-xl text-xs font-bold transition-all">第一冊</button>
                <button id="new-book2-tab" onclick="window.setNewBookTab(2)" class="flex-1 border py-1.5 rounded-xl text-xs font-bold transition-all">第二冊</button>
                <button id="new-note-tab" onclick="window.setNewBookTab('note')" class="flex-1 border py-1.5 rounded-xl text-xs font-bold transition-all">個人筆記</button>
            </div>
            <div id="new-lesson-container" class="no-scrollbar pb-3 mb-2"></div>
            <div id="new-category-picker" class="flex flex-wrap gap-2 mb-6 no-scrollbar"></div>
            <button id="submit-btn" onclick="window.submitNewWord()" class="w-3/4 mx-auto bg-slate-900 text-white py-3 rounded-2xl font-bold shadow-xl block text-sm">儲存到單字冊</button>
        </section>
        <ul id="vocab-list" class="space-y-3 mt-4"></ul>
    </div>

    <div id="quiz-overlay" class="fixed inset-0 z-[400] bg-slate-900 hidden flex flex-col items-center justify-center p-6 text-white text-center">
        <div id="quiz-setup" class="w-full max-w-md">
            <h2 class="text-2xl font-black mb-6 uppercase">測試設定</h2>
            <div id="quiz-range-list" class="grid grid-cols-3 gap-2 mb-8 max-h-48 overflow-y-auto p-2"></div>
            <div class="flex gap-2 justify-center mb-6">
                <button id="modeStdBtn" onclick="window.setQuizMode('standard')" class="px-4 py-2 rounded-xl text-sm font-bold bg-indigo-600">單字卡</button>
                <button id="modeHearBtn" onclick="window.setQuizMode('hearing')" class="px-4 py-2 rounded-xl text-sm font-bold bg-slate-700">聽力模式</button>
            </div>
            <button onclick="window.startQuiz()" class="w-full py-6 bg-indigo-600 rounded-3xl mb-4 font-bold text-xl shadow-xl">開始練習</button>
            <button onclick="document.getElementById('quiz-overlay').classList.add('hidden')" class="text-slate-500 font-bold">返回</button>
        </div>
        <div id="quiz-content" class="w-full max-w-md flex flex-col h-full hidden">
            <div class="flex justify-between items-center mb-6"><button onclick="window.backToQuizSetup()" class="text-base font-black text-indigo-300">← 返回</button><span id="quiz-progress-display" class="text-xs"></span><button onclick="location.reload()" class="text-white">✕</button></div>
            <div id="quiz-card" class="card-inner flex-1 bg-indigo-600 rounded-[40px] flex items-center justify-center p-8 text-white text-4xl font-black" onclick="this.classList.toggle('is-flipped')">
                <div id="quiz-card-text">點擊翻面</div>
            </div>
            <div class="grid grid-cols-2 gap-4 mt-8 mb-4">
                <button onclick="window.quizFail()" class="bg-rose-500 text-white py-6 rounded-3xl font-black">加強</button>
                <button onclick="window.quizPass()" class="bg-emerald-500 text-white py-6 rounded-3xl font-black">下一個</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, query, orderBy, where, setDoc, deleteDoc, writeBatch } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDOsqjX7FknZOKTdEUiofhIwIwGVRUIdN4", authDomain: "jpnote-5f436.firebaseapp.com", projectId: "jpnote-5f436", storageBucket: "jpnote-5f436.firebasestorage.app", messagingSenderId: "881660892658", appId: "1:881660892658:web:9d88f9b2332aa9e2b3076b", measurementId: "G-QV2NRXQSY7" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const vocabsCol = collection(db, "vocabs");
        const progressCol = collection(db, "user_progress");

        // --- 全域變數 ---
        window.vocabs = []; window.userProgress = {}; window.selectedLessons = []; window.selectedTypes = [];
        window.currentBook = 1; window.newWordBook = 1; 
        window.selectedNewCat = 'n.'; window.selectedNewLesson = '未分類';
        window.sortOrder = 'desc'; window.quizPool = []; window.remainingPool = []; window.currentQuizWord = null; window.quizMode = 'standard';
        let currentUser = localStorage.getItem('jp_user_shared') || '訪客';
        let userHistory = JSON.parse(localStorage.getItem('jp_user_history') || '["訪客"]');
        
        const BOOK_MAP = { 1: ["附錄", "未分類", "L1", "L2", "L3", "L4", "L5", "L6", "L7", "L8", "L9", "L10", "L11", "L12"], 2: ["L13", "L14", "L15", "L16", "L17", "L18", "L19", "L20", "L21", "L22", "L23", "L24", "L25"] };
        const LESSON_ORDER = ["附錄", "未分類", "L1", "L2", "L3", "L4", "L5", "L6", "L7", "L8", "L9", "L10", "L11", "L12", "L13", "L14", "L15", "L16", "L17", "L18", "L19", "L20", "L21", "L22", "L23", "L24", "L25", "個人筆記"];
        const APPENDIX_ORDER = ['數字', '星期', '時候', '時刻', '時間', '期間', '量詞'];
        const STANDARD_CAT = ['n.', 'v.', 'adj.', '會話', '練習C', '關聯單語', '其他'];

        // --- 🚀 核心：翻譯引擎 (終極穩定版) ---
        window.isTranslating = false;
        window.autoTranslate = async () => {
            const wordEl = document.getElementById('word');
            const meaningEl = document.getElementById('meaning');
            const readingEl = document.getElementById('reading');
            const w = wordEl.value.trim();
            
            if (window.isTranslating || !w || window.lastTranslatedWord === w) return;

            window.isTranslating = true;
            window.lastTranslatedWord = w;
            meaningEl.placeholder = "🔍 翻譯中...";

            try {
                const API_KEY = "AIzaSyDb7BA3Ikwz33KKjJgrzrc1afHIoGj7q94";
                const aiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
                
                const response = await fetch(aiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `你現在是辭典。請翻譯日文單字「${w}」。
                        1. 中文意思：僅限核心單詞（如：去、吃）。絕對禁止贅字如「我要、進行」。
                        2. 漢字：提供該單字的標準漢字。若無漢字則留空。
                        格式範例：{"m":"去", "k":"行きます"}` }] }]
                    })
                });

                const aiData = await response.json();
                
                if (aiData.candidates && aiData.candidates[0].content.parts) {
                    let text = aiData.candidates[0].content.parts[0].text;
                    // 強化解析：剔除 Markdown 標籤與換行
                    text = text.replace(/```json|```/g, "").trim();
                    const data = JSON.parse(text);

                    // 填入資料 (強制更新 DOM)
                    meaningEl.value = data.m.replace(/^(我|要|在|進行|了)/g, "").trim();
                    readingEl.value = (data.k && data.k !== w && !/[a-zA-Z]/.test(data.k)) ? data.k : "";
                    
                    // 針對高頻單字 Hard-fix
                    const fixes = {"いきます":"去","きます":"來","かえります":"回來","たべます":"吃"};
                    if(fixes[w]) meaningEl.value = fixes[w];
                    if(w==="いきます") readingEl.value = "行きます";

                } else {
                    throw new Error("AI 無法識別");
                }
            } catch (e) {
                // 如果 AI 失敗，走 Google 翻譯保底
                console.log("AI 失敗，走備援路徑");
                const gUrl = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=ja&tl=zh-TW&dt=t&dt=rm&q=${encodeURIComponent(w)}`;
                const gRes = await fetch(gUrl).then(r => r.json());
                if(gRes && gRes[0]) {
                    meaningEl.value = gRes[0][0][0].replace(/我?要|正在|進行|了/g, "");
                    readingEl.value = gRes[0][1] ? gRes[0][1][3] : "";
                }
            } finally {
                window.isTranslating = false;
                meaningEl.placeholder = "中文意思";
            }
        };

        // --- 🚀 全功能 UI 邏輯 ---
        window.fixScroll = () => { setTimeout(() => window.scrollTo({ top: document.getElementById('input-section').offsetTop - 280, behavior: 'smooth' }), 300); };
        window.showToast = (m) => { const t = document.getElementById("toast"); t.innerText = m; t.className = "show"; setTimeout(() => t.className = "", 2000); };
        window.switchUser = (n) => { localStorage.setItem('jp_user_shared', n); location.reload(); };
        window.addNewUserAction = () => { const n = prompt("使用者:"); if(n){ userHistory.unshift(n.trim()); localStorage.setItem('jp_user_history', JSON.stringify(userHistory.slice(0,8))); window.switchUser(n); } };
        window.renderUserHistory = () => { document.getElementById('user-history-list').innerHTML = userHistory.map(n => `<button onclick="window.switchUser('${n}')" class="text-[10px] px-2.5 py-0.5 rounded-full font-bold border ${n === currentUser ? 'bg-indigo-600 text-white' : 'bg-white text-slate-500'}">${n}</button>`).join('') + `<button onclick="window.addNewUserAction()" class="text-[10px] bg-slate-100 px-2.5 py-0.5 rounded-full font-bold border">+ 新增</button>`; };

        window.switchBook = (b) => { window.currentBook = b; window.selectedLessons = (b === 'note' ? ['個人筆記'] : []); window.selectedTypes = []; window.renderLessonUI(); window.renderTypeUI(); window.renderList(); };
        window.renderLessonUI = () => {
            const c = document.getElementById('lesson-filter-container');
            document.getElementById('book1-btn').className = `flex-1 border py-2 rounded-xl text-xs font-bold ${window.currentBook===1?'lesson-active text-white':'bg-white'}`;
            document.getElementById('book2-btn').className = `flex-1 border py-2 rounded-xl text-xs font-bold ${window.currentBook===2?'lesson-active text-white':'bg-white'}`;
            document.getElementById('book-note-btn').className = `flex-1 border py-2 rounded-xl text-xs font-bold ${window.currentBook==='note'?'note-active text-white':'bg-white'}`;
            if (window.currentBook === 'note') c.innerHTML = "";
            else c.innerHTML = BOOK_MAP[window.currentBook].map(l => `<button onclick="window.toggleLesson('${l}')" class="ls-btn-style px-4 py-1 border rounded-lg ${window.selectedLessons.includes(l)?'lesson-active text-white':'bg-white'}">${l}</button>`).join('');
        };
        window.renderTypeUI = () => {
            const types = window.selectedLessons.includes('附錄') ? APPENDIX_ORDER : STANDARD_CAT;
            document.getElementById('type-filter').innerHTML = types.map(t => `<button onclick="window.toggleType('${t}')" class="ls-btn-style border px-3 py-1 rounded-lg ${window.selectedTypes.includes(t)?'type-active text-white':'bg-white'}">${t}</button>`).join('');
        };
        window.toggleLesson = (l) => { const i = window.selectedLessons.indexOf(l); if(i>-1) window.selectedLessons.splice(i,1); else window.selectedLessons.push(l); window.renderLessonUI(); window.renderTypeUI(); window.renderList(); };
        window.toggleType = (t) => { const i = window.selectedTypes.indexOf(t); if(i>-1) window.selectedTypes.splice(i,1); else window.selectedTypes.push(t); window.renderTypeUI(); window.renderList(); };
        window.toggleSort = () => { window.sortOrder = (window.sortOrder==='desc'?'asc':'desc'); document.getElementById('sort-btn').innerText = `排序 ${window.sortOrder==='desc'?'↓':'↑'}`; window.renderList(); };
        
        window.setNewBookTab = (b) => { window.newWordBook = b; window.selectedNewLesson = (b === 'note' ? '個人筆記' : (b === 1 ? '附錄' : 'L13')); window.selectedNewCat = (window.selectedNewLesson === '附錄' ? '數字' : 'n.'); window.renderNewLessonUI(); window.renderNewCategoryUI(); };
        window.renderNewLessonUI = () => {
            const c = document.getElementById('new-lesson-container'); const b = document.getElementById('submit-btn');
            if (window.newWordBook === 'note') { c.innerHTML = ""; b.innerText = "儲存個人單字"; b.className = "w-3/4 mx-auto bg-orange-500 text-white py-3 rounded-2xl font-bold block text-sm"; }
            else { c.innerHTML = BOOK_MAP[window.newWordBook].map(l => `<button onclick="window.setNewLesson('${l}')" class="ls-btn-style px-4 py-1 border rounded-lg ${window.selectedNewLesson===l?'active-new-cat text-white':'bg-white'}">${l}</button>`).join(''); b.innerText = "儲存到單字冊"; b.className = "w-3/4 mx-auto bg-slate-900 text-white py-3 rounded-2xl font-bold block text-sm"; }
        };
        window.setNewLesson = (l) => { window.selectedNewLesson = l; window.selectedNewCat = (l === '附錄' ? '數字' : 'n.'); window.renderNewLessonUI(); window.renderNewCategoryUI(); };
        window.renderNewCategoryUI = () => {
            const types = window.selectedNewLesson === '附錄' ? APPENDIX_ORDER : STANDARD_CAT;
            document.getElementById('new-category-picker').innerHTML = types.map(t => `<button onclick="window.setNewCategory('${t}')" class="ls-btn-style border px-3 py-1 rounded-lg ${window.selectedNewCat === t ? 'active-new-cat text-white' : 'bg-white'}">${t}</button>`).join('');
        };
        window.setNewCategory = (c) => { window.selectedNewCat = c; window.renderNewCategoryUI(); };

        window.renderList = () => {
            const s = document.getElementById('searchInput').value.toLowerCase();
            let f = window.vocabs.filter(v => {
                if (v.lesson === '個人筆記') { if (v.uid !== currentUser) return false; } else { if (v.uid) return false; }
                const mL = window.selectedLessons.length === 0 || window.selectedLessons.includes(v.lesson);
                const mT = window.selectedTypes.length === 0 || window.selectedTypes.includes(v.category);
                const mS = s === "" || v.word.toLowerCase().includes(s) || (v.reading && v.reading.toLowerCase().includes(s)) || v.meaning.toLowerCase().includes(s);
                return mL && mT && mS;
            });
            f.sort((a,b) => { const lA = LESSON_ORDER.indexOf(a.lesson), lB = LESSON_ORDER.indexOf(b.lesson); if(lA !== lB) return lA - lB; return window.sortOrder === 'desc' ? (b.createdAt?.seconds||0) - (a.createdAt?.seconds||0) : (a.createdAt?.seconds||0) - (b.createdAt?.seconds||0); });
            document.getElementById('vocab-list').innerHTML = f.map(v => `<li class="bg-white p-5 rounded-[32px] flex justify-between items-center shadow-sm border border-slate-100">
                <div class="flex-1 pr-4">
                    <div class="flex gap-1.5 mb-1 text-[9px] font-black uppercase"><span class="${v.lesson==='個人筆記'?'bg-orange-50 text-orange-500':'bg-indigo-50 text-indigo-500'} px-2 py-0.5 rounded-md">${v.lesson}</span><span class="bg-pink-50 text-pink-500 px-2 py-0.5 rounded-md">${v.category || 'n.'}</span></div>
                    <div class="text-xl font-bold">${v.word}${v.reading?`<span class="text-xs text-slate-400 ml-1">【${v.reading}】</span>`:''}</div>
                    <div class="text-slate-500 text-xs mt-1 font-bold">${v.meaning}</div>
                </div>
                <div class="flex gap-1"><button onclick="window.speakAction('${v.word}')" class="w-10 h-10 flex bg-indigo-50 text-indigo-600 rounded-full text-xl justify-center items-center">🔊</button><button onclick="window.deleteWord('${v.id}')" class="w-10 h-10 flex text-slate-200 justify-center items-center">✕</button></div>
            </li>`).join('');
        };

        window.submitNewWord = async () => {
            const w = document.getElementById('word').value.trim(), r = document.getElementById('reading').value.trim(), m = document.getElementById('meaning').value.trim();
            if (!w || !m) return alert("內容不完整");
            await addDoc(vocabsCol, { word: w, reading: r, meaning: m, lesson: window.selectedNewLesson, category: window.selectedNewCat, createdAt: new Date(), uid: window.selectedNewLesson === '個人筆記' ? currentUser : null });
            document.getElementById('word').value = ""; document.getElementById('reading').value = ""; document.getElementById('meaning').value = ""; window.lastTranslatedWord = ""; window.showToast("✅ 已儲存");
        };

        window.deleteWord = async (id) => { if(confirm("確定刪除？")) await deleteDoc(doc(vocabsCol, id)); };

        // --- 🚀 測驗與統計全量恢復 ---
        window.openQuizSetup = () => { 
            const pool = window.vocabs.filter(v => window.selectedLessons.length === 0 || window.selectedLessons.includes(v.lesson));
            if(!pool.length) return alert("範圍內沒有單字"); window.quizPool = pool; 
            document.getElementById('quiz-overlay').classList.remove('hidden');
            document.getElementById('quiz-range-list').innerHTML = window.selectedLessons.map(l => `<div class="bg-white/10 p-2 rounded-lg text-xs font-bold text-indigo-300 text-center">${l}</div>`).join('');
        };
        window.setQuizMode = (m) => { window.quizMode = m; document.getElementById('modeStdBtn').className = `px-4 py-2 rounded-xl text-sm font-bold ${m==='standard'?'bg-indigo-600':'bg-slate-700'}`; document.getElementById('modeHearBtn').className = `px-4 py-2 rounded-xl text-sm font-bold ${m==='hearing'?'bg-indigo-600':'bg-slate-700'}`; };
        window.startQuiz = () => { window.remainingPool = [...window.quizPool].sort(() => Math.random() - 0.5); document.getElementById('quiz-setup').classList.add('hidden'); document.getElementById('quiz-content').classList.remove('hidden'); window.nextQuestion(); };
        window.nextQuestion = () => {
            if(!window.remainingPool.length) return location.reload();
            window.currentQuizWord = window.remainingPool.shift();
            document.getElementById('quiz-card').classList.remove('is-flipped');
            document.getElementById('quiz-card-text').innerText = window.quizMode === 'standard' ? window.currentQuizWord.meaning : "🔈 聽力";
            if(window.quizMode === 'hearing') window.speakAction(window.currentQuizWord.word);
        };
        window.backToQuizSetup = () => { document.getElementById('quiz-content').classList.add('hidden'); document.getElementById('quiz-setup').classList.remove('hidden'); };
        window.quizPass = () => window.nextQuestion();
        window.quizFail = () => window.nextQuestion();

        // 語音與初始化
        let audioUnlocked = false;
        window.initAudioOnFirstClick = () => { if (!audioUnlocked) { window.speechSynthesis.speak(new SpeechSynthesisUtterance(" ")); audioUnlocked = true; } };
        window.speakAction = (t) => { window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(t); u.lang='ja-JP'; u.rate=0.5; window.speechSynthesis.speak(u); };

        // Firebase 監聽
        onSnapshot(query(vocabsCol, orderBy("createdAt", "desc")), (snap) => { window.vocabs = snap.docs.map(d => ({id:d.id, ...d.data()})); window.renderList(); });
        onSnapshot(query(progressCol, where("uid", "==", currentUser)), (snap) => { window.userProgress = {}; snap.docs.forEach(d => { window.userProgress[d.data().vocabId] = d.data(); }); });

        window.renderUserHistory(); window.switchBook(1); window.renderNewLessonUI(); window.renderNewCategoryUI();
    </script>
</body>
</html>
