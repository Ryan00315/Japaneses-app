<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kingtex JPNote</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        .card-flip { perspective: 1000px; height: 100%; width: 100%; }
        .card-inner { transition: transform 0.4s; transform-style: preserve-3d; cursor: pointer; height: 100%; width: 100%; position: relative; }
        .card-inner.is-flipped { transform: rotateY(180deg); }
        .card-front, .card-back { backface-visibility: hidden; position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 40px; padding: 2rem; pointer-events: none; }
        .card-back { transform: rotateY(180deg); }
        .sticky-header { z-index: 200 !important; background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(10px); position: sticky; top: 0; }
        .lesson-active, .type-active, .active-new-cat { background-color: #4f46e5 !important; color: white !important; border-color: #4f46e5 !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; overflow-x: auto; display: flex; gap: 0.5rem; -webkit-overflow-scrolling: touch; cursor: grab; }
        #input-section { max-height: 0; opacity: 0; overflow: hidden; transition: all 0.4s ease; }
        #input-section.show { max-height: 2000px; opacity: 1; margin-bottom: 1.5rem; }
        .modal-overlay { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(4px); }
        .ls-btn-style { color: #64748b; font-weight: 700; font-size: 11px; border-color: #e2e8f0; white-space: nowrap; flex-shrink: 0; padding: 6px 12px; border-radius: 10px; border-width: 1px; }
        #toast { visibility: hidden; min-width: 200px; background-color: #333; color: #fff; text-align: center; border-radius: 50px; padding: 16px; position: fixed; z-index: 2000; left: 50%; bottom: 100px; transform: translateX(-50%); font-weight: bold; }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 1.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 100px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 100px; opacity: 1;} to {bottom: 0; opacity: 0;} }
        .quiz-option { width: 100%; padding: 1rem; margin-bottom: 0.75rem; border: 2px solid #e2e8f0; border-radius: 1.5rem; font-weight: bold; transition: 0.2s; background: white; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-10 font-sans text-slate-900">

    <div id="toast">✅ 操作成功</div>

    <div class="sticky-header border-b border-slate-200">
        <div class="max-w-md mx-auto px-4 pt-4 pb-2">
            <div class="flex items-center justify-between mb-3">
                <div class="flex items-center gap-1">
                    <button onclick="switchUser()" id="user-display" class="bg-indigo-600 text-white px-3 py-1.5 rounded-full text-[10px] font-black shadow-sm">👤 使用者: 訪客</button>
                    <button onclick="addNewUserAction()" class="bg-emerald-500 text-white px-3 py-1.5 rounded-full text-[10px] font-black shadow-sm">＋ 新增</button>
                </div>
                <button onclick="speakAction('こんにちは')" class="text-[9px] bg-yellow-400 text-white px-2 py-0.5 rounded-md font-bold shadow-sm">🔈 語音測試</button>
            </div>
            <div class="flex items-center justify-between gap-1">
                <h1 class="text-lg font-black text-indigo-600 tracking-tighter">Kingtex JPNote</h1>
                <div class="flex items-center gap-1">
                    <button onclick="showStatsModal()" class="text-[9px] bg-slate-100 px-2 py-2 rounded-full font-bold">進度</button>
                    <button onclick="toggleImport(true)" class="text-[9px] bg-slate-100 px-2 py-2 rounded-full font-bold">批量</button>
                    <button onclick="openQuizSetup()" class="bg-orange-500 text-white px-3 py-1.5 rounded-full text-xs font-bold shadow-lg">隨機測試</button>
                </div>
            </div>
        </div>
        <div class="max-w-md mx-auto px-4 pb-3">
            <div class="flex gap-2 mb-2">
                <button id="book1-btn" onclick="switchBook(1)" class="flex-1 border py-2 rounded-xl text-xs font-bold">第一冊</button>
                <button id="book2-btn" onclick="switchBook(2)" class="flex-1 border py-2 rounded-xl text-xs font-bold">第二冊</button>
                <button id="book-note-btn" onclick="switchBook('note')" class="flex-1 border py-2 rounded-xl text-xs font-bold">個人筆記</button>
            </div>
            <div class="no-scrollbar pb-2 flex gap-2" id="lesson-filter-container"></div>
            <div id="type-filter" class="no-scrollbar pb-2 flex gap-2"></div>
            <div class="flex gap-2">
                <input type="text" id="searchInput" oninput="renderList()" placeholder="🔍 搜尋單字..." class="flex-1 p-3 rounded-2xl bg-white border border-slate-200 outline-none text-sm shadow-inner">
                <button id="sort-btn" onclick="toggleSort()" class="bg-white border border-slate-200 px-4 rounded-2xl text-[11px] font-bold text-slate-600">排序 ↓</button>
            </div>
        </div>
    </div>

    <div class="max-w-md mx-auto p-4">
        <button onclick="document.getElementById('input-section').classList.toggle('show');" class="mb-4 bg-indigo-50 text-indigo-600 px-6 py-2.5 rounded-full text-sm font-bold border border-indigo-100 w-full shadow-sm">＋ 新增單語</button>
        <section id="input-section" class="bg-white rounded-3xl p-5 border border-slate-200 shadow-sm text-center">
             <div class="grid grid-cols-2 gap-3 mb-4">
                <input id="word" type="text" placeholder="單語 (日文)" onblur="autoTranslate()" class="bg-slate-50 p-4 rounded-2xl outline-none text-sm border">
                <input id="reading" type="text" placeholder="漢字" class="bg-slate-50 p-4 rounded-2xl outline-none text-sm border">
            </div>
            <input id="meaning" type="text" placeholder="中文意思" class="w-full bg-slate-50 p-4 rounded-2xl mb-4 outline-none text-sm border">
            <div class="flex gap-2 mb-3">
                <button onclick="setNewBookTab(1)" id="new-book1-tab" class="flex-1 border py-1.5 rounded-xl text-xs font-bold">第一冊</button>
                <button onclick="setNewBookTab(2)" id="new-book2-tab" class="flex-1 border py-1.5 rounded-xl text-xs font-bold">第二冊</button>
                <button onclick="setNewBookTab('note')" id="new-note-tab" class="flex-1 border py-1.5 rounded-xl text-xs font-bold">個人筆記</button>
            </div>
            <div id="new-lesson-container" class="no-scrollbar pb-3 mb-2 flex gap-2 overflow-x-auto"></div>
            <div id="new-category-picker" class="flex flex-wrap gap-2 mb-6 no-scrollbar"></div>
            <button id="submit-btn" onclick="submitNewWord()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold shadow-xl text-sm">儲存到單字冊</button>
        </section>
        <ul id="vocab-list" class="space-y-4 mt-4"></ul>
    </div>

    <div id="quiz-overlay" class="fixed inset-0 z-[400] bg-slate-900 hidden flex flex-col items-center justify-center p-6 text-white text-center">
        <div id="quiz-setup" class="w-full max-w-md">
            <h2 class="text-2xl font-black mb-6 uppercase">測試設定</h2>
            <div class="space-y-4 text-left mb-8">
                <label class="flex items-center justify-between p-4 bg-slate-800 rounded-2xl border border-white/10"><span class="font-bold">單字卡測試</span><input type="checkbox" id="mode-card" class="w-6 h-6" checked></label>
                <label class="flex items-center justify-between p-4 bg-slate-800 rounded-2xl border border-white/10"><span class="font-bold">聽寫測試</span><input type="checkbox" id="mode-audio" class="w-6 h-6"></label>
                <label class="flex items-center justify-between p-4 bg-slate-800 rounded-2xl border border-white/10"><span class="font-bold">開啟拼寫模式</span><input type="checkbox" id="mode-spell" class="w-6 h-6"></label>
            </div>
            <button onclick="startQuiz()" class="w-full py-6 bg-indigo-600 rounded-3xl mb-4 font-bold text-xl shadow-xl">開始練習</button>
            <button onclick="document.getElementById('quiz-overlay').classList.add('hidden')" class="text-slate-500 font-bold">返回</button>
        </div>
        <div id="quiz-content-run" class="w-full max-w-md flex flex-col h-full hidden">
            <div class="flex justify-between items-center mb-6">
                <button onclick="location.reload()" class="text-2xl text-white">✕</button>
            </div>
            <div id="quiz-main-area"></div>
        </div>
    </div>

    <div id="edit-modal" class="fixed inset-0 z-[350] modal-overlay hidden flex flex-col items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-[40px] p-8 shadow-2xl">
            <h2 class="text-xl font-black mb-6 text-center text-indigo-600">編輯單語</h2>
            <div class="space-y-4">
                <input id="edit-word" type="text" class="w-full bg-slate-50 p-3 rounded-xl border outline-none">
                <input id="edit-reading" type="text" class="w-full bg-slate-50 p-3 rounded-xl border outline-none">
                <input id="edit-meaning" type="text" class="w-full bg-slate-50 p-3 rounded-xl border outline-none font-bold">
                <div class="flex gap-3 pt-4"><button onclick="document.getElementById('edit-modal').classList.add('hidden')" class="flex-1 bg-slate-100 py-3 rounded-2xl font-bold">取消</button><button onclick="saveWordEdit()" class="flex-1 bg-indigo-600 text-white py-3 rounded-2xl font-bold">保存</button></div>
            </div>
        </div>
    </div>

    <div id="import-overlay" class="fixed inset-0 z-[500] bg-slate-900 hidden flex flex-col items-center justify-center p-6 text-white"><div class="w-full max-w-md"><h3 class="text-xl font-bold mb-4 text-center">批量匯入</h3><textarea id="import-text" rows="8" class="w-full bg-slate-800 rounded-2xl p-4 text-sm outline-none mb-4" placeholder="單語,漢字,意思"></textarea><div class="flex gap-2"><button onclick="toggleImport(false)" class="flex-1 bg-slate-700 py-3 rounded-xl font-bold">取消</button><button onclick="startImport()" class="flex-1 bg-indigo-500 py-3 rounded-xl font-bold">匯入</button></div></div></div>

    <script>
        // 使用 Firebase 8 傳統腳本掛載至全域
        const firebaseConfig = { apiKey: "AIzaSyDOsqjX7FknZOKTdEUiofhIwIwGVRUIdN4", authDomain: "jpnote-5f436.firebaseapp.com", projectId: "jpnote-5f436", storageBucket: "jpnote-5f436.firebasestorage.app", messagingSenderId: "881660892658", appId: "1:881660892658:web:9d88f9b2332aa9e2b3076b" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const vocabsCol = db.collection("vocabs");

        window.vocabs = []; window.selectedLessons = []; window.selectedTypes = [];
        window.currentBook = 1; window.newWordBook = 1; window.selectedNewCat = 'n.'; window.selectedNewLesson = '未分類';
        window.editingId = null; window.sortOrder = 'desc';
        let currentUser = localStorage.getItem('jp_user_shared') || '訪客';
        const BOOK_MAP = { 1: ["附錄", "未分類", "L1", "L2", "L3", "L4", "L5", "L6", "L7", "L8", "L9", "L10", "L11", "L12"], 2: ["L13", "L14", "L15", "L16", "L17", "L18", "L19", "L20", "L21", "L22", "L23", "L24", "L25"] };
        
        // --- 🚀 Gemini 內置智慧字典 ---
        const GeminiDict = {
            "ついたち": ["1日", "1號"], "ふつか": ["2日", "2號/兩天"], "みっか": ["3日", "3號/三天"], "よっか": ["4日", "4號/四天"], "いつか": ["5日", "5號/五天"], "むいか": ["6日", "6號/六天"], "なのか": ["7日", "7號/七天"], "ようか": ["8日", "8號/八天"], "ここのか": ["9日", "9號/九天"], "とおか": ["10日", "10號/十天"],
            "いちじ": ["1時", "1點"], "にじ": ["2時", "2點"], "さんじ": ["3時", "3點"], "よじ": ["4時", "4點"], "ごじ": ["5時", "5點"], "ろくじ": ["6時", "6點"], "しちじ": ["7時", "7點"], "はちじ": ["8時", "8點"], "くじ": ["9時", "9點"], "じゅうじ": ["10時", "10點"], "じゅういちじ": ["11時", "11點"], "じゅうにじ": ["12時", "12點"],
            "がつ": ["月", "月 (月份)"], "なんがつ": ["何月", "幾月"], "なんにち": ["何日", "幾號/何時"]
        };

        // 按鈕功能核心
        window.switchUser = () => { const u = prompt("目前使用者：", currentUser); if(u) { currentUser = u; localStorage.setItem('jp_user_shared', u); location.reload(); } };
        window.addNewUserAction = () => { const u = prompt("新增使用者："); if(u) { currentUser = u; localStorage.setItem('jp_user_shared', u); location.reload(); } };
        window.autoTranslate = () => { const w = document.getElementById('word').value.trim().toLowerCase(); if(GeminiDict[w]) { document.getElementById('reading').value = GeminiDict[w][0]; document.getElementById('meaning').value = GeminiDict[w][1]; } };
        window.speakAction = (t) => { window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(t); u.lang='ja-JP'; u.rate=0.7; window.speechSynthesis.speak(u); };
        window.showToast = (m) => { const t = document.getElementById("toast"); t.innerText = m; t.classList.add("show"); setTimeout(() => t.classList.remove("show"), 2000); };
        window.toggleSort = () => { window.sortOrder = window.sortOrder === 'desc' ? 'asc' : 'desc'; document.getElementById('sort-btn').innerText = `排序 ${window.sortOrder==='desc'?'↓':'↑'}`; renderList(); };
        window.toggleImport = (s) => document.getElementById('import-overlay').classList.toggle('hidden', !s);
        window.showStatsModal = () => alert("功能正常：請點擊單字卡右側的圖示進行編輯。");

        // 管理功能
        window.openEditAction = (id) => {
            const v = window.vocabs.find(x => x.id === id); if(!v) return;
            window.editingId = id; document.getElementById('edit-word').value = v.word; document.getElementById('edit-reading').value = v.reading || ""; document.getElementById('edit-meaning').value = v.meaning;
            document.getElementById('edit-modal').classList.remove('hidden');
        };
        window.saveWordEdit = async () => {
            const data = { word: document.getElementById('edit-word').value, reading: document.getElementById('edit-reading').value, meaning: document.getElementById('edit-meaning').value };
            await vocabsCol.doc(window.editingId).update(data); document.getElementById('edit-modal').classList.add('hidden'); showToast("✅ 已更新");
        };
        window.deleteWord = async (id) => { if(confirm("確定刪除？")) await vocabsCol.doc(id).delete(); };

        window.submitNewWord = async () => {
            const w = document.getElementById('word').value.trim(), r = document.getElementById('reading').value.trim(), m = document.getElementById('meaning').value.trim();
            if (!w || !m) return alert("請填寫內容");
            const data = { word: w, reading: r, meaning: m, lesson: window.selectedNewLesson, category: window.selectedNewCat, createdAt: new Date() };
            if (window.selectedNewLesson === '個人筆記') data.uid = currentUser;
            await vocabsCol.add(data); document.getElementById('word').value = document.getElementById('reading').value = document.getElementById('meaning').value = ""; showToast("✅ 已儲存");
        };

        // 隨機測試
        let qzArr = [], qzIdx = 0;
        window.openQuizSetup = () => { document.getElementById('quiz-setup').classList.remove('hidden'); document.getElementById('quiz-content-run').classList.add('hidden'); document.getElementById('quiz-overlay').classList.remove('hidden'); };
        window.startQuiz = () => {
            qzArr = window.vocabs.filter(v => (v.lesson !== '個人筆記' || v.uid === currentUser) && (window.selectedLessons.length === 0 || window.selectedLessons.includes(v.lesson)));
            if(qzArr.length < 2) return alert("單字量不足");
            qzArr = qzArr.sort(() => Math.random() - 0.5).slice(0, 10); qzIdx = 0;
            document.getElementById('quiz-setup').classList.add('hidden'); document.getElementById('quiz-content-run').classList.remove('hidden');
            renderQuizStep();
        };
        function renderQuizStep() {
            if(qzIdx >= qzArr.length) { document.getElementById('quiz-main-area').innerHTML = "<h2 class='text-2xl font-black mb-4'>結束！</h2><button onclick='location.reload()' class='w-full bg-indigo-600 py-4 rounded-2xl'>完成</button>"; return; }
            const q = qzArr[qzIdx]; const isAudio = document.getElementById('mode-audio').checked; const isSpell = document.getElementById('mode-spell').checked;
            if(isAudio) speakAction(q.word);
            let html = `<div class='text-4xl font-black mb-10'>${isAudio ? '???' : q.word}</div>`;
            if(isSpell) {
                html += `<input id='qz-in' type='text' class='w-full p-5 bg-white/10 rounded-2xl mb-4 text-center text-xl font-bold outline-none border-2 border-white/20'><button onclick='checkQ()' class='w-full bg-indigo-600 py-4 rounded-2xl font-bold'>檢查</button>`;
            } else {
                const opts = [q.meaning, ...window.vocabs.filter(v => v.meaning !== q.meaning).sort(() => Math.random() - 0.5).slice(0, 2).map(v => v.meaning)].sort(() => Math.random() - 0.5);
                html += `<div class='grid gap-3'>${opts.map(o => `<button onclick="checkQ('${o}')" class='quiz-option'>${o}</button>`).join('')}</div>`;
            }
            document.getElementById('quiz-main-area').innerHTML = html;
        }
        window.checkQ = (ans) => {
            const q = qzArr[qzIdx]; const input = document.getElementById('mode-spell').checked ? document.getElementById('qz-in').value.trim() : ans;
            if(input === q.meaning || input === q.reading || input === q.word) { showToast("⭕ 正確"); qzIdx++; renderQuizStep(); } 
            else alert(`❌ 錯誤！正確是：${q.meaning}`);
        };

        // 列表渲染
        window.renderList = () => {
            const s = document.getElementById('searchInput').value.toLowerCase();
            const filtered = window.vocabs.filter(v => {
                if (v.lesson === '個人筆記' && v.uid !== currentUser) return false;
                const matchL = window.selectedLessons.length === 0 || window.selectedLessons.includes(v.lesson);
                return matchL && (s === "" || v.word.toLowerCase().includes(s) || v.meaning.toLowerCase().includes(s));
            });
            document.getElementById('vocab-list').innerHTML = filtered.map(v => `
                <li class="bg-white p-5 rounded-[32px] flex justify-between items-center shadow-sm border border-slate-100">
                    <div class="flex-1 text-left">
                        <div class="flex gap-1.5 mb-1 text-[9px] font-black uppercase"><span class="${v.lesson==='個人筆記'?'bg-orange-50 text-orange-500':'bg-indigo-50 text-indigo-500'} px-2 py-0.5 rounded-md">${v.lesson}</span></div>
                        <div class="text-xl font-bold">${v.word}${v.reading?`<span class="text-xs text-slate-400 ml-1">【${v.reading}】</span>`:''}</div>
                        <div class="text-slate-500 text-xs mt-1 font-bold">${v.meaning}</div>
                    </div>
                    <div class="flex gap-1">
                        <button onclick="speakAction('${v.word.replace(/'/g,"\\'")}')" class="w-10 h-10 flex items-center justify-center bg-indigo-50 text-indigo-600 rounded-full text-xl">🔊</button>
                        <button onclick="openEditAction('${v.id}')" class="w-10 h-10 flex items-center justify-center bg-blue-50 text-blue-500 rounded-full text-sm">🖊️</button>
                        <button onclick="deleteWord('${v.id}')" class="w-10 h-10 flex items-center justify-center text-slate-300 font-bold">✕</button>
                    </div>
                </li>`).join('');
        };

        window.switchBook = (b) => { window.currentBook = b; window.selectedLessons = b==='note'?['個人筆記']:[]; renderLessonUI(); renderList(); };
        window.toggleLesson = (l) => { const i = window.selectedLessons.indexOf(l); if(i>-1) window.selectedLessons.splice(i,1); else window.selectedLessons.push(l); renderLessonUI(); renderList(); };
        window.renderLessonUI = () => {
            document.getElementById('lesson-filter-container').innerHTML = window.currentBook === 'note' ? "" : BOOK_MAP[window.currentBook].map(l => `<button onclick="toggleLesson('${l}')" class="ls-btn-style ${window.selectedLessons.includes(l)?'lesson-active text-white':'bg-white'}">${l}</button>`).join('');
            document.getElementById('book1-btn').className = `flex-1 border py-2 rounded-xl text-xs font-bold ${window.currentBook===1?'lesson-active text-white':'bg-white text-slate-500'}`;
            document.getElementById('book2-btn').className = `flex-1 border py-2 rounded-xl text-xs font-bold ${window.currentBook===2?'lesson-active text-white':'bg-white text-slate-500'}`;
            document.getElementById('book-note-btn').className = `flex-1 border py-2 rounded-xl text-xs font-bold ${window.currentBook==='note'?'note-active text-white':'bg-white text-slate-500'}`;
        };
        window.setNewBookTab = (b) => { window.newWordBook = b; window.selectedNewLesson = b==='note'?'個人筆記':(b===1?'附錄':'L13'); renderNewLessonUI(); };
        window.renderNewLessonUI = () => {
            document.getElementById('new-lesson-container').innerHTML = window.newWordBook === 'note' ? "" : BOOK_MAP[window.newWordBook].map(l => `<button onclick="window.selectedNewLesson='${l}';renderNewLessonUI();" class="ls-btn-style ${window.selectedNewLesson===l?'active-new-cat text-white':'bg-white'}">${l}</button>`).join('');
            document.getElementById('new-book1-tab').className = `flex-1 border py-1.5 rounded-xl text-xs font-bold ${window.newWordBook===1?'lesson-active text-white':'bg-white'}`;
            document.getElementById('new-book2-tab').className = `flex-1 border py-1.5 rounded-xl text-xs font-bold ${window.newWordBook===2?'lesson-active text-white':'bg-white'}`;
            document.getElementById('new-note-tab').className = `flex-1 border py-1.5 rounded-xl text-xs font-bold ${window.newWordBook==='note'?'note-active text-white':'bg-white'}`;
        };

        vocabsCol.orderBy("createdAt", "desc").onSnapshot((snap) => { window.vocabs = snap.docs.map(d => ({id: d.id, ...d.data()})); renderList(); document.getElementById('user-display').innerText = `👤 使用者: ${currentUser}`; });
        setNewBookTab(1); renderLessonUI();
    </script>
</body>
</html>
