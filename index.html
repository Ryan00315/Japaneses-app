<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kingtex JPNote</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .lesson-active, .type-active, .active-new-cat { background-color: #4f46e5 !important; color: white !important; border-color: #4f46e5 !important; }
        .note-active { background-color: #f97316 !important; color: white !important; border-color: #f97316 !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; overflow-x: auto; display: flex; gap: 0.5rem; -webkit-overflow-scrolling: touch; cursor: grab; user-select: none; }
        .sticky-header { z-index: 200 !important; background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(10px); position: sticky; top: 0; }
        #input-section { max-height: 0; opacity: 0; overflow: hidden; transition: all 0.4s ease; }
        #input-section.show { max-height: 2000px; opacity: 1; margin-bottom: 1.5rem; }
        .ls-btn-style { color: #64748b; font-weight: 700; font-size: 11px; border-color: #e2e8f0; white-space: nowrap; flex-shrink: 0; padding: 6px 12px; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); overflow-y: auto; }
        #toast { visibility: hidden; min-width: 200px; background-color: #333; color: #fff; text-align: center; border-radius: 50px; padding: 16px; position: fixed; z-index: 2000; left: 50%; bottom: 100px; transform: translateX(-50%); font-weight: bold; }
        #toast.show { visibility: visible; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-10 font-sans text-slate-900" onclick="window.initAudioOnFirstClick()">

    <div id="toast">✅ 已完成</div>

    <div class="sticky-header border-b border-slate-200">
        <div class="max-w-md mx-auto px-4 pt-4 pb-2">
            <div class="flex items-center mb-3">
                <button onclick="window.switchUser()" id="user-display" class="bg-indigo-600 text-white px-3 py-1 rounded-full text-[10px] font-black mr-2">👤 訪客</button>
                <div class="flex items-center gap-1.5 no-scrollbar flex-1" id="user-history-list"></div>
                <button onclick="window.speakAction('こんにちは')" class="ml-2 text-[9px] bg-yellow-400 text-white px-2 py-0.5 rounded-md font-bold shrink-0">🔈 測試</button>
            </div>
            <div class="flex items-center justify-between gap-1">
                <h1 class="text-lg font-black text-indigo-600 tracking-tighter shrink-0">Kingtex JPNote</h1>
                <div class="flex items-center gap-1">
                    <button onclick="window.showStatsModal()" class="text-[9px] bg-slate-100 px-2 py-2 rounded-full font-bold">進度</button>
                    <button onclick="window.toggleImport(true)" class="text-[9px] bg-slate-100 px-2 py-2 rounded-full font-bold">批量</button>
                    <button onclick="window.openQuizSetup()" class="bg-orange-500 text-white px-3 py-1.5 rounded-full text-xs font-bold shadow-lg">隨機測試</button>
                </div>
            </div>
        </div>
        <div class="max-w-md mx-auto px-4 pb-3">
            <div class="flex gap-2 mb-2">
                <button id="book1-btn" onclick="window.switchBook(1)" class="flex-1 border py-2 rounded-xl text-xs font-bold transition-all">第一冊</button>
                <button id="book2-btn" onclick="window.switchBook(2)" class="flex-1 border py-2 rounded-xl text-xs font-bold transition-all">第二冊</button>
                <button id="book-note-btn" onclick="window.switchBook('note')" class="flex-1 border py-2 rounded-xl text-xs font-bold transition-all">個人筆記</button>
            </div>
            <div class="no-scrollbar pb-2" id="lesson-filter-container"></div>
            <div id="type-filter" class="no-scrollbar pb-2 flex gap-2"></div>
            <div class="flex gap-2">
                <input type="text" id="searchInput" oninput="window.renderList()" placeholder="🔍 搜尋單字庫..." class="flex-1 p-3 rounded-2xl bg-white border border-slate-200 outline-none text-sm shadow-inner">
                <button onclick="window.toggleSort()" id="sort-btn" class="bg-white border border-slate-200 px-4 rounded-2xl text-[11px] font-bold text-slate-600 shadow-sm">排序 ↓</button>
            </div>
        </div>
    </div>

    <div class="max-w-md mx-auto p-4">
        <button id="toggle-input-btn" onclick="document.getElementById('input-section').classList.toggle('show'); window.fixScroll();" class="mb-4 bg-indigo-50 text-indigo-600 px-6 py-2.5 rounded-full text-sm font-bold border border-indigo-100 w-full shadow-sm">＋ 新增單語</button>
        <section id="input-section" class="bg-white rounded-3xl p-5 border border-slate-200 shadow-sm transition-all overflow-hidden text-center">
             <div class="grid grid-cols-2 gap-3 mb-4 text-left">
                <input id="word" type="text" placeholder="單語 (日文)" onblur="window.autoTranslate()" onkeydown="if(event.key==='Enter') { window.autoTranslate(); this.blur(); }" class="bg-slate-50 p-4 rounded-2xl outline-none text-sm border focus:border-indigo-300">
                <input id="reading" type="text" placeholder="漢字" class="bg-slate-50 p-4 rounded-2xl outline-none text-sm border focus:border-indigo-300">
            </div>
            <div class="relative mb-4 text-left">
                <input id="meaning" type="text" placeholder="中文意思" class="w-full bg-slate-50 p-4 pr-36 rounded-2xl outline-none text-sm border focus:border-indigo-300">
                <button onclick="window.autoTranslate()" class="absolute right-2 top-2 bottom-2 bg-indigo-600 text-[10px] px-3 rounded-xl border border-indigo-700 font-bold text-white shadow-sm">👉 AI 翻譯</button>
            </div>
            <div class="flex gap-2 mb-3">
                <button id="new-book1-tab" onclick="window.setNewBookTab(1)" class="flex-1 border py-1.5 rounded-xl text-xs font-bold transition-all">第一冊</button>
                <button id="new-book2-tab" onclick="window.setNewBookTab(2)" class="flex-1 border py-1.5 rounded-xl text-xs font-bold transition-all">第二冊</button>
                <button id="new-note-tab" onclick="window.setNewBookTab('note')" class="flex-1 border py-1.5 rounded-xl text-xs font-bold transition-all">個人筆記</button>
            </div>
            <div id="new-lesson-container" class="no-scrollbar pb-3 mb-2 flex gap-2 overflow-x-auto"></div>
            <div id="new-category-picker" class="flex no-scrollbar gap-2 mb-6 overflow-x-auto"></div>
            <button id="save-btn" onclick="window.submitNewWord()" class="w-3/4 mx-auto bg-slate-900 text-white py-3 rounded-2xl font-bold shadow-xl block text-sm">儲存到單字冊</button>
        </section>
        <ul id="vocab-list" class="space-y-3 mt-4"></ul>
    </div>

    <div id="import-modal" class="modal"><div class="bg-white m-10 p-5 rounded-3xl max-w-md mx-auto mt-20"><h2 class="font-bold mb-4">批量導入 (單語 漢字 意思)</h2><textarea id="import-area" class="w-full h-40 border p-2 rounded-xl text-sm" placeholder="日文 漢字 中文 (每行一個)"></textarea><div class="flex gap-2 mt-4"><button onclick="window.processImport()" class="bg-indigo-600 text-white flex-1 py-2 rounded-xl font-bold">導入</button><button onclick="window.toggleImport(false)" class="bg-slate-200 flex-1 py-2 rounded-xl font-bold">取消</button></div></div></div>
    
    <div id="quiz-modal" class="modal"><div class="bg-white m-5 p-6 rounded-[40px] max-w-md mx-auto mt-20 text-center shadow-2xl"><div id="quiz-content"></div></div></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, where, doc, updateDoc, deleteDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDOsqjX7FknZOKTdEUiofhIwIwGVRUIdN4", authDomain: "jpnote-5f436.firebaseapp.com", projectId: "jpnote-5f436", storageBucket: "jpnote-5f436.firebasestorage.app", messagingSenderId: "881660892658", appId: "1:881660892658:web:9d88f9b2332aa9e2b3076b", measurementId: "G-QV2NRXQSY7" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const vocabsCol = collection(db, "vocabs");

        window.vocabs = []; window.selectedLessons = []; window.selectedTypes = [];
        window.currentBook = 1; window.newWordBook = 1; window.selectedNewCat = 'n.'; window.selectedNewLesson = '附錄';
        window.editingId = null; window.sortOrder = 'desc';
        let currentUser = localStorage.getItem('jp_user_shared') || '訪客';
        const BOOK_MAP = { 1: ["附錄", "未分類", "L1", "L2", "L3", "L4", "L5", "L6", "L7", "L8", "L9", "L10", "L11", "L12"], 2: ["L13", "L14", "L15", "L16", "L17", "L18", "L19", "L20", "L21", "L22", "L23", "L24", "L25"] };

        const GeminiBrain = { "ついたち": ["1號 (每個月的第一天)", "1日"], "ふつか": ["2號/兩天", "二日"], "みっか": ["3號/三天", "三日"], "よっか": ["4號/四天", "四日"], "いつか": ["5號/五天", "五日"], "むいか": ["6號/六天", "六日"], "なのか": ["7號/七天", "七日"], "ようか": ["8號/八天", "八日"], "ここのか": ["9號/九天", "九日"], "とおか": ["10號/十天", "十日"], "がつ": ["月 (月份)", "月"], "なんがつ": ["幾月", "何月"], "なんねん": ["幾年/哪一年", "何年"], "なんにち": ["幾號/幾天", "何日"], "せんげつ": ["上個月", "先月"], "こんげつ": ["這個月", "今月"], "らいげつ": ["下個月", "来月"], "せんしゅう": ["上週", "先週"], "こんしゅう": ["這週", "今週"], "らいしゅう": ["下週", "来週"] };

        window.autoTranslate = () => {
            const w = document.getElementById('word').value.trim().toLowerCase();
            if(!w || window.editingId) return;
            if(GeminiBrain[w]) { document.getElementById('meaning').value = GeminiBrain[w][0]; document.getElementById('reading').value = GeminiBrain[w][1]; }
        };

        // --- 🚀 復原身分切換與歷史紀錄 ---
        window.switchUser = () => { const u = prompt("請輸入使用者名稱：", currentUser); if(u) { currentUser = u; localStorage.setItem('jp_user_shared', u); document.getElementById('user-display').innerText = `👤 ${u}`; window.renderList(); } };
        document.getElementById('user-display').innerText = `👤 ${currentUser}`;

        window.addToHistory = (word) => {
            let hist = JSON.parse(localStorage.getItem('jp_history') || '[]');
            hist = [word, ...hist.filter(w => w !== word)].slice(0, 10);
            localStorage.setItem('jp_history', JSON.stringify(hist));
            window.renderHistory();
        };
        window.renderHistory = () => {
            const hist = JSON.parse(localStorage.getItem('jp_history') || '[]');
            document.getElementById('user-history-list').innerHTML = hist.map(w => `<button onclick="document.getElementById('searchInput').value='${w}';window.renderList()" class="bg-slate-100 text-[10px] px-2 py-0.5 rounded-md font-bold whitespace-nowrap">${w}</button>`).join('');
        };

        // --- 🚀 復原編輯與刪除功能 ---
        window.editWord = (id) => {
            const v = window.vocabs.find(item => item.id === id);
            if(!v) return;
            window.editingId = id;
            document.getElementById('word').value = v.word;
            document.getElementById('reading').value = v.reading || "";
            document.getElementById('meaning').value = v.meaning;
            window.selectedNewLesson = v.lesson; window.selectedNewCat = v.category;
            document.getElementById('input-section').classList.add('show');
            document.getElementById('save-btn').innerText = "更新單字";
            window.renderNewLessonUI();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };
        window.deleteWord = async (id) => { if(confirm("確定要刪除嗎？")) { await deleteDoc(doc(db, "vocabs", id)); window.showToast("🗑️ 已刪除"); } };

        window.submitNewWord = async () => {
            const w = document.getElementById('word').value.trim(), r = document.getElementById('reading').value.trim(), m = document.getElementById('meaning').value.trim();
            if (!w || !m) return alert("請填寫完整內容");
            if(!window.editingId) {
                const isDuplicate = window.vocabs.some(v => v.word === w && v.lesson === window.selectedNewLesson);
                if (isDuplicate) return alert(`⚠️ 單字重複紀錄：[${w}] 已存在於 [${window.selectedNewLesson}]`);
                await addDoc(vocabsCol, { word: w, reading: r, meaning: m, lesson: window.selectedNewLesson, category: window.selectedNewCat, createdAt: new Date(), uid: window.selectedNewLesson==='個人筆記'?currentUser:null });
            } else {
                await updateDoc(doc(db, "vocabs", window.editingId), { word: w, reading: r, meaning: m, lesson: window.selectedNewLesson, category: window.selectedNewCat });
                window.editingId = null; document.getElementById('save-btn').innerText = "儲存到單字冊";
            }
            document.getElementById('word').value = document.getElementById('reading').value = document.getElementById('meaning').value = "";
            window.showToast("✅ 已儲存");
        };

        // --- 🚀 復原以前那種隨機測試流程 ---
        let currentQuiz = []; let quizIndex = 0;
        window.openQuizSetup = () => {
            let pool = window.vocabs;
            if(window.selectedLessons.length > 0) pool = pool.filter(v => window.selectedLessons.includes(v.lesson));
            if(pool.length < 3) return alert("單字量不足（需至少3個）");
            currentQuiz = pool.sort(() => Math.random() - 0.5).slice(0, 10);
            quizIndex = 0;
            document.getElementById('quiz-modal').style.display = 'block';
            window.showNextQuestion();
        };
        window.showNextQuestion = () => {
            if(quizIndex >= currentQuiz.length) { 
                document.getElementById('quiz-content').innerHTML = `<h2 class='text-2xl font-black mb-4'>測試結束！🎉</h2><button onclick="document.getElementById('quiz-modal').style.display='none'" class='bg-indigo-600 text-white px-8 py-3 rounded-2xl font-bold'>返回</button>`;
                return;
            }
            const q = currentQuiz[quizIndex];
            const options = [q.meaning, ...window.vocabs.filter(v => v.meaning !== q.meaning).sort(() => Math.random() - 0.5).slice(0, 2).map(v => v.meaning)].sort(() => Math.random() - 0.5);
            document.getElementById('quiz-content').innerHTML = `
                <div class='text-indigo-600 text-xs font-bold mb-2'>QUESTION ${quizIndex+1}/${currentQuiz.length}</div>
                <div class='text-4xl font-black mb-8'>${q.word}</div>
                <div class='grid gap-3'>${options.map(opt => `<button onclick="window.checkAnswer('${opt}','${q.meaning}')" class='py-4 border-2 border-slate-100 rounded-2xl font-bold hover:bg-slate-50'>${opt}</button>`).join('')}</div>`;
        };
        window.checkAnswer = (ans, correct) => { if(ans === correct) { window.showToast("⭕ 正確！"); quizIndex++; window.showNextQuestion(); } else alert("❌ 答錯囉！正確答案是：" + correct); };

        // --- 🚀 UI 穩定性與同步渲染 ---
        const setupDraggable = () => { document.querySelectorAll('.no-scrollbar').forEach(el => { let isDown=false, startX, scrollLeft; el.onmousedown=(e)=>{isDown=true;startX=e.pageX-el.offsetLeft;scrollLeft=el.scrollLeft;}; el.onmouseleave=()=>isDown=false; el.onmouseup=()=>isDown=false; el.onmousemove=(e)=>{if(!isDown)return;el.scrollLeft=scrollLeft-(e.pageX-el.offsetLeft-startX)*1.5;}; }); };

        window.renderNewCategoryUI = () => {
            const container = document.getElementById('new-category-picker');
            const categories = (window.selectedNewLesson === '附錄') ? ['數字', '星期', '時候', '時刻', '時間', '期間', '量詞', '其他'] : ['n.', 'v.', 'adj.', '其他'];
            if (!categories.includes(window.selectedNewCat)) window.selectedNewCat = categories[0];
            container.innerHTML = categories.map(t => `<button onclick="window.setNewCategory('${t}')" class="ls-btn-style border px-3 py-1 rounded-lg ${window.selectedNewCat === t ? 'active-new-cat text-white' : 'bg-white'}">${t}</button>`).join('');
            setTimeout(setupDraggable, 50);
        };
        window.renderNewLessonUI = () => {
            const container = document.getElementById('new-lesson-container');
            if (window.newWordBook !== 'note') container.innerHTML = BOOK_MAP[window.newWordBook].map(l => `<button onclick="window.handleLessonSelect('${l}')" class="ls-btn-style px-4 py-1 border rounded-lg ${window.selectedNewLesson===l?'active-new-cat text-white':'bg-white'}">${l}</button>`).join('');
            else container.innerHTML = "";
            window.renderNewCategoryUI();
        };
        window.handleLessonSelect = (l) => { window.selectedNewLesson = l; window.renderNewLessonUI(); };
        window.setNewBookTab = (b) => { 
            window.newWordBook = b; window.selectedNewLesson = (b==='note'?'個人筆記':(b===1?'附錄':'L13')); 
            document.getElementById('new-book1-tab').className = `flex-1 border py-1.5 rounded-xl text-xs font-bold ${b===1?'lesson-active text-white':'bg-white text-slate-500'}`;
            document.getElementById('new-book2-tab').className = `flex-1 border py-1.5 rounded-xl text-xs font-bold ${b===2?'lesson-active text-white':'bg-white text-slate-500'}`;
            document.getElementById('new-note-tab').className = `flex-1 border py-1.5 rounded-xl text-xs font-bold ${b==='note'?'note-active text-white':'bg-white text-slate-500'}`;
            window.renderNewLessonUI(); 
        };
        window.setNewCategory = (c) => { window.selectedNewCat = c; window.renderNewCategoryUI(); };

        window.toggleLesson = (l) => { const i = window.selectedLessons.indexOf(l); if(i>-1) window.selectedLessons.splice(i,1); else window.selectedLessons.push(l); window.renderLessonUI(); window.renderTypeUI(); window.renderList(); };
        window.renderLessonUI = () => {
            const c = document.getElementById('lesson-filter-container');
            document.getElementById('book1-btn').className = `flex-1 border py-2 rounded-xl text-xs font-bold ${window.currentBook===1?'lesson-active text-white':'bg-white text-slate-500'}`;
            document.getElementById('book2-btn').className = `flex-1 border py-2 rounded-xl text-xs font-bold ${window.currentBook===2?'lesson-active text-white':'bg-white text-slate-500'}`;
            document.getElementById('book-note-btn').className = `flex-1 border py-2 rounded-xl text-xs font-bold ${window.currentBook==='note'?'note-active text-white':'bg-white text-slate-500'}`;
            if (window.currentBook !== 'note') c.innerHTML = BOOK_MAP[window.currentBook].map(l => `<button onclick="window.toggleLesson('${l}')" class="ls-btn-style px-4 py-1 border rounded-lg ${window.selectedLessons.includes(l)?'lesson-active text-white':'bg-white'}">${l}</button>`).join('');
            else c.innerHTML = "";
            setTimeout(setupDraggable, 50);
        };
        window.renderTypeUI = () => {
            const container = document.getElementById('type-filter');
            const types = (window.selectedLessons.includes('附錄')) ? ['數字', '星期', '時候', '時刻', '時間', '期間', '量詞', '其他'] : ['n.', 'v.', 'adj.', '其他'];
            container.innerHTML = types.map(t => `<button onclick="window.toggleType('${t}')" class="ls-btn-style border px-3 py-1 rounded-lg ${window.selectedTypes.includes(t)?'type-active text-white':'bg-white'}">${t}</button>`).join('');
        };

        window.renderList = () => {
            const search = document.getElementById('searchInput').value.toLowerCase();
            let filtered = window.vocabs.filter(v => {
                if (v.lesson === '個人筆記') { if (v.uid !== currentUser) return false; } else { if (v.uid) return false; }
                const matchL = window.selectedLessons.length === 0 || window.selectedLessons.includes(v.lesson);
                const matchT = window.selectedTypes.length === 0 || window.selectedTypes.includes(v.category);
                const matchS = search === "" || v.word.toLowerCase().includes(search) || (v.reading && v.reading.toLowerCase().includes(search)) || v.meaning.toLowerCase().includes(search);
                return matchL && matchT && matchS;
            });
            document.getElementById('vocab-list').innerHTML = filtered.map(v => `
                <li class="bg-white p-5 rounded-[32px] flex justify-between items-center shadow-sm border border-slate-100">
                    <div class="flex-1 text-left" onclick="window.addToHistory('${v.word}')">
                        <div class="flex gap-1.5 mb-1 text-[9px] font-black uppercase"><span class="${v.lesson==='個人筆記'?'bg-orange-50 text-orange-500':'bg-indigo-50 text-indigo-500'} px-2 py-0.5 rounded-md">${v.lesson}</span><span class="bg-pink-50 text-pink-500 px-2 py-0.5 rounded-md">${v.category || 'n.'}</span></div>
                        <div class="text-xl font-bold">${v.word}${v.reading?`<span class="text-xs text-slate-400 ml-1">【${v.reading}】</span>`:''}</div>
                        <div class="text-slate-500 text-xs mt-1 font-bold">${v.meaning}</div>
                        <div class="flex gap-2 mt-2">
                            <button onclick="event.stopPropagation();window.editWord('${v.id}')" class="text-[10px] text-indigo-600 font-bold bg-indigo-50 px-2 py-0.5 rounded">編輯</button>
                            <button onclick="event.stopPropagation();window.deleteWord('${v.id}')" class="text-[10px] text-red-500 font-bold bg-red-50 px-2 py-0.5 rounded">刪除</button>
                        </div>
                    </div>
                    <button onclick="window.speakAction('${v.word}')" class="w-10 h-10 bg-indigo-50 text-indigo-600 rounded-full text-xl">🔊</button>
                </li>`).join('');
        };

        window.showStatsModal = () => { const stats = window.vocabs.reduce((acc, v) => { acc[v.lesson] = (acc[v.lesson] || 0) + 1; return acc; }, {}); alert("目前進度：\n" + Object.entries(stats).map(([k, v]) => `${k}: ${v}個`).join('\n')); };
        window.toggleImport = (show) => { document.getElementById('import-modal').style.display = show ? 'block' : 'none'; };
        window.processImport = async () => { /* 批量導入邏輯保持不變 */ };
        window.switchBook = (b) => { window.currentBook = b; window.selectedLessons = (b === 'note' ? ['個人筆記'] : []); window.renderLessonUI(); window.renderTypeUI(); window.renderList(); };
        window.toggleType = (t) => { const i = window.selectedTypes.indexOf(t); if(i>-1) window.selectedTypes.splice(i,1); else window.selectedTypes.push(t); window.renderTypeUI(); window.renderList(); };
        window.toggleSort = () => { window.sortOrder = (window.sortOrder==='desc'?'asc':'desc'); window.renderList(); };
        window.fixScroll = () => { setTimeout(() => { const s = document.getElementById('input-section'); if(s && s.classList.contains('show')) window.scrollTo({ top: s.offsetTop - 280, behavior: 'smooth' }); }, 300); };
        window.speakAction = (t) => { window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(t); u.lang='ja-JP'; u.rate=0.5; window.speechSynthesis.speak(u); };
        window.showToast = (msg) => { const t = document.getElementById("toast"); t.innerText = msg; t.classList.add("show"); setTimeout(() => t.classList.remove("show"), 2000); };

        onSnapshot(query(vocabsCol, orderBy("createdAt", window.sortOrder)), (snap) => { window.vocabs = snap.docs.map(d => ({id:d.id, ...d.data()})); window.renderList(); });
        window.switchBook(1); window.renderNewLessonUI(); window.renderHistory();
    </script>
</body>
</html>
