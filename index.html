    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, query, orderBy, where, setDoc, deleteDoc, writeBatch } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDOsqjX7FknZOKTdEUiofhIwIwGVRUIdN4", authDomain: "jpnote-5f436.firebaseapp.com", projectId: "jpnote-5f436", storageBucket: "jpnote-5f436.firebasestorage.app", messagingSenderId: "881660892658", appId: "1:881660892658:web:9d88f9b2332aa9e2b3076b", measurementId: "G-QV2NRXQSY7" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const vocabsCol = collection(db, "vocabs");
        const progressCol = collection(db, "user_progress");

        window.vocabs = []; window.userProgress = {}; window.selectedLessons = []; window.selectedTypes = [];
        window.currentBook = 1; window.newWordBook = 1; window.selectedNewCat = 'n.'; window.selectedNewLesson = 'ТюфтѕєжАъ';
        window.sortOrder = 'desc'; window.isTranslating = false;
        window.quizPool = []; window.remainingPool = []; window.currentQuizWord = null; window.quizMode = 'standard';
        window.choiceSub = 'jp-ch'; window.currentChoices = [];
        let currentUser = localStorage.getItem('jp_user_shared') || 'Уефт«б';
        let userHistory = JSON.parse(localStorage.getItem('jp_user_history') || '["Уефт«б"]');
        const BOOK_MAP = { 1: ["жЎёжїё", "ТюфтѕєжАъ", "L1", "L2", "L3", "L4", "L5", "L6", "L7", "L8", "L9", "L10", "L11", "L12"], 2: ["L13", "L14", "L15", "L16", "L17", "L18", "L19", "L20", "L21", "L22", "L23", "L24", "L25"] };
        const LESSON_ORDER = ["жЎёжїё", "ТюфтѕєжАъ", "L1", "L2", "L3", "L4", "L5", "L6", "L7", "L8", "L9", "L10", "L11", "L12", "L13", "L14", "L15", "L16", "L17", "L18", "L19", "L20", "L21", "L22", "L23", "L24", "L25", "тђІС║║уГєУеў"];

        window.checkDuplicate = () => {
            const w = document.getElementById('word').value.trim();
            const m = document.getElementById('meaning').value.trim();
            const btn = document.getElementById('submit-btn');
            const existing = window.vocabs.find(v => (w && v.word === w) || (m && v.meaning === m));
            if (existing) {
                btn.innerText = `Рџа№ИЈ тќ«тГЌти▓тГўтюе (ж╗ъТЊіТЪЦуюІ)`;
                btn.className = "w-3/4 mx-auto bg-yellow-500 text-white py-3 rounded-2xl font-bold shadow-xl block text-sm";
                btn.onclick = () => { document.getElementById('searchInput').value = w || m; window.renderList(); window.showToast("ти▓уѓ║ТѓеТљют░ІуЈЙТюЅтќ«тГЌ"); };
            } else {
                btn.onclick = window.submitNewWord;
                if (window.newWordBook === 'note') { btn.innerText = "тё▓тГўтђІС║║тќ«тГЌ"; btn.className = "w-3/4 mx-auto bg-orange-500 text-white py-3 rounded-2xl font-bold shadow-xl block text-sm"; }
                else { btn.innerText = "тё▓тГўтѕ░тќ«тГЌтєі"; btn.className = "w-3/4 mx-auto bg-slate-900 text-white py-3 rounded-2xl font-bold shadow-xl block text-sm"; }
            }
        };

        // ­Ъџђ у┐╗УГ»тіЪУЃй (ТюђухѓуЏ┤жђБТииТиєуЅѕ + т░ѕТЦГу╣ЂжФћС┐«ТГБ)
        window.autoTranslate = async () => {
            if (window.isTranslating) return;

            const wordField = document.getElementById('word');
            const inputVal = wordField ? wordField.value.trim() : "";
            if (!inputVal) return alert("УФІУ╝ИтЁЦтќ«тГЌ");

            const encodedKey = "Qmk3aU9keW1kQkpFb2ZVMFNxMjFqRm9XRUt3ell2QVpZVHdDMlN6dWlQWHpIdW9LYm5xSEpRUUo5OUNDQUNVTHlDcFhKM3czQUFBYkFDT0dGeTB1Cg=="; 
            const key = atob(encodedKey).trim(); 

            window.isTranslating = true;
            const transBtn = document.getElementById('translate-btn-action');
            if (transBtn) { transBtn.disabled = true; transBtn.innerText = "РЈ│..."; }

            try {
                const response = await fetch("https://api.cognitive.microsofttranslator.com/translate?api-version=3.0&to=zh-Hant&to=ja", {
                    method: "POST",
                    headers: { "Ocp-Apim-Subscription-Key": key, "Content-Type": "application/json" },
                    body: JSON.stringify([{ "Text": inputVal }])
                });

                const resText = await response.text();
                if (!response.ok) throw new Error("Azure УфЇУГЅтц▒ТЋЌ");

                const data = JSON.parse(resText);

        window.initAudioOnFirstClick = () => { if (!audioUnlocked) { try { window.speechSynthesis.speak(new SpeechSynthesisUtterance(" ")); audioUnlocked = true; } catch(e) {} } };
        window.speakAction = (t) => { window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(t); u.lang='ja-JP'; u.rate=0.7; window.speechSynthesis.speak(u); };
        onSnapshot(query(vocabsCol, orderBy("createdAt", "desc")), (snap) => { window.vocabs = snap.docs.map(d => ({id:d.id, ...d.data()})); window.renderList(); });
        onSnapshot(query(progressCol, where("uid", "==", currentUser)), (snap) => { window.userProgress = {}; snap.docs.forEach(d => { window.userProgress[d.data().vocabId] = d.data(); }); window.renderList(); });
        window.renderUserHistory(); window.switchBook(1); window.renderNewLessonUI(); window.renderNewCategoryUI();
    </script>
</body>
</html>
