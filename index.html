<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kingtex JPNote</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card-flip { perspective: 1000px; } .card-inner { transition: transform 0.4s; transform-style: preserve-3d; cursor: pointer; position: relative; height: 100%; width: 100%; }
        .card-inner.is-flipped { transform: rotateY(180deg); } .card-front, .card-back { backface-visibility: hidden; position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 40px; padding: 2rem; pointer-events: none; }
        .card-back { transform: rotateY(180deg); } .sticky-header { z-index: 200; background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(10px); position: sticky; top: 0; }
        .lesson-active, .type-active, .active-new-cat, .active-edit-cat { background-color: #4f46e5 !important; color: white !important; }
        .note-active { background-color: #f97316 !important; color: white !important; } .no-scrollbar::-webkit-scrollbar { display: none; }
        #input-section { max-height: 0; opacity: 0; overflow: hidden; transition: all 0.4s ease; } #input-section.show { max-height: 3000px; opacity: 1; margin-bottom: 1.5rem; }
        .ls-btn-style { color: #64748b; font-weight: 700; font-size: 11px; border: 1px solid #e2e8f0; white-space: nowrap; padding: 4px 12px; border-radius: 8px; }
        #toast { visibility: hidden; min-width: 200px; background: #333; color: #fff; text-align: center; border-radius: 50px; padding: 16px; position: fixed; z-index: 3000; left: 50%; bottom: 100px; transform: translateX(-50%); }
        #toast.show { visibility: visible; animation: fade 2s; } @keyframes fade { 0%,100% {opacity:0} 10%,90% {opacity:1} }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-10 text-slate-900" onclick="window.initAudioOnFirstClick()">
    <div id="toast">✅ 操作成功</div>

    <div class="sticky-header border-b border-slate-200">
        <div class="max-w-md mx-auto px-4 pt-4 pb-2">
            <div class="flex items-center mb-3"><div class="flex items-center gap-1.5 no-scrollbar flex-1 overflow-x-auto" id="user-history-list"></div><button onclick="window.speakAction('こんにちは')" class="ml-2 text-[9px] bg-yellow-400 text-white px-2 py-0.5 rounded-md font-bold">🔈 測試語音</button></div>
            <div class="flex items-center justify-between gap-1"><h1 class="text-lg font-black text-indigo-600 tracking-tighter">Kingtex JPNote</h1><div class="flex items-center gap-1"><button onclick="window.showStatsModal()" class="text-[9px] bg-slate-100 px-2 py-2 rounded-full font-bold">進度</button><button onclick="window.toggleImport(true)" class="text-[9px] bg-slate-100 px-2 py-2 rounded-full font-bold">批量</button><button onclick="window.openQuizSetup()" class="bg-orange-500 text-white px-3 py-1.5 rounded-full text-xs font-bold shadow-lg">隨機測試</button></div></div>
        </div>
        <div class="max-w-md mx-auto px-4 pb-3">
            <div class="flex gap-2 mb-2"><button id="book1-btn" onclick="window.switchBook(1)" class="flex-1 border py-2 rounded-xl text-xs font-bold transition-all">第一冊</button><button id="book2-btn" onclick="window.switchBook(2)" class="flex-1 border py-2 rounded-xl text-xs font-bold transition-all">第二冊</button><button id="book-note-btn" onclick="window.switchBook('note')" class="flex-1 border py-2 rounded-xl text-xs font-bold transition-all">個人筆記</button></div>
            <div class="no-scrollbar pb-2 flex gap-2 overflow-x-auto" id="lesson-filter-container"></div>
            <div id="type-filter" class="no-scrollbar pb-2 flex gap-2 overflow-x-auto"></div>
            <div class="flex gap-2"><input type="text" id="searchInput" oninput="window.renderList()" placeholder="🔍 搜尋..." class="flex-1 p-3 rounded-2xl bg-white border border-slate-200 outline-none text-sm shadow-inner"><button id="sort-btn" onclick="window.toggleSort()" class="bg-white border px-4 rounded-2xl text-[11px] font-bold text-slate-600 shadow-sm">排序 ↓</button></div>
        </div>
    </div>

    <div class="max-w-md mx-auto p-4">
        <button onclick="document.getElementById('input-section').classList.toggle('show'); window.fixScroll();" class="mb-4 bg-indigo-50 text-indigo-600 px-6 py-2.5 rounded-full text-sm font-bold border border-indigo-100 w-full active:scale-95 transition-all shadow-sm">＋ 新增單語</button>
        <section id="input-section" class="bg-white rounded-3xl p-5 border shadow-sm text-center">
             <div class="grid grid-cols-2 gap-3 mb-4 text-left"><input id="word" type="text" placeholder="單語 (日文)" onkeydown="if(event.key==='Enter') window.autoTranslate()" class="bg-slate-50 p-4 rounded-2xl outline-none text-sm border focus:border-indigo-300"><input id="reading" type="text" placeholder="日語漢字" class="bg-slate-50 p-4 rounded-2xl outline-none text-sm border focus:border-indigo-300"></div>
            <div class="relative mb-4 text-left"><input id="meaning" type="text" placeholder="繁體中文意思" class="w-full bg-slate-50 p-4 pr-32 rounded-2xl outline-none text-sm border focus:border-indigo-300"><button onclick="window.autoTranslate()" class="absolute right-2 top-2 bottom-2 bg-indigo-600 text-[10px] px-3 rounded-xl font-bold text-white shadow-lg">👉 AI 翻譯</button></div>
            <div class="flex gap-2 mb-3"><button id="new-book1-tab" onclick="window.setNewBookTab(1)" class="flex-1 border py-1.5 rounded-xl text-xs font-bold transition-all">第一冊</button><button id="new-book2-tab" onclick="window.setNewBookTab(2)" class="flex-1 border py-1.5 rounded-xl text-xs font-bold transition-all">第二冊</button><button id="new-note-tab" onclick="window.setNewBookTab('note')" class="flex-1 border py-1.5 rounded-xl text-xs font-bold transition-all">個人筆記</button></div>
            <div id="new-lesson-container" class="no-scrollbar pb-3 mb-2 flex gap-2 overflow-x-auto"></div>
            <div id="new-category-picker" class="flex flex-wrap gap-2 mb-6 no-scrollbar"></div>
            <button id="submit-btn" onclick="window.submitNewWord()" class="w-3/4 mx-auto bg-slate-900 text-white py-3 rounded-2xl font-bold block text-sm shadow-xl active:scale-95">儲存到單字冊</button>
        </section>
        <ul id="vocab-list" class="space-y-3 mt-4"></ul>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, query, orderBy, where, setDoc, deleteDoc, writeBatch } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        
        const firebaseConfig = { apiKey: "AIzaSyDOsqjX7FknZOKTdEUiofhIwIwGVRUIdN4", authDomain: "jpnote-5f436.firebaseapp.com", projectId: "jpnote-5f436", storageBucket: "jpnote-5f436.firebasestorage.app", messagingSenderId: "881660892658", appId: "1:881660892658:web:9d88f9b2332aa9e2b3076b", measurementId: "G-QV2NRXQSY7" };
        const app = initializeApp(firebaseConfig); 
        const db = getFirestore(app); 
        const vCol = collection(db, "vocabs"); 
        const pCol = collection(db, "user_progress");
        
        const KEY = "AIzaSyDb7BA3Ikwz33KKjJgrzrc1afHIoGj7q94";
        
        window.vocabs = []; window.userProgress = {}; window.selectedLessons = []; window.selectedTypes = []; window.currentBook = 1; window.newBook = 1; window.selectedNewCat = 'n.'; window.selectedNewL = '未分類'; window.sortOrder = 'desc';
        let user = localStorage.getItem('jp_user_shared') || '訪客'; let history = JSON.parse(localStorage.getItem('jp_user_history') || '["訪客"]');
        const MAP = { 1: ["附錄", "未分類", "L1", "L2", "L3", "L4", "L5", "L6", "L7", "L8", "L9", "L10", "L11", "L12"], 2: ["L13", "L14", "L15", "L16", "L17", "L18", "L19", "L20", "L21", "L22", "L23", "L24", "L25"] };

        // --- 🚀 最終極 JSON 翻譯解析器 (修正解析失敗問題) ---
        window.autoTranslate = async () => {
            const w = document.getElementById('word').value.trim(); 
            if(!w) return; 
            window.showToast("⏳ AI 正在翻譯...");

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${KEY}`, {
                    method: 'POST', 
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({ 
                        contents: [{ 
                            parts: [{ 
                                text: `Translate the Japanese word "${w}". Return ONLY a JSON object: {"k":"Kanji/Reading","m":"Traditional Chinese meaning"}. Example: {"k":"食べる","m":"吃"}. Strictly NO markdown, NO code blocks, NO extra explanation.` 
                            }] 
                        }] 
                    })
                });

                const d = await res.json();
                if (!d.candidates || !d.candidates[0].content.parts[0].text) throw new Error("API Empty");
                
                let raw = d.candidates[0].content.parts[0].text;
                console.log("Raw Response:", raw); // 開發者模式偵錯用

                // 移除所有 Markdown 標籤和空白
                raw = raw.replace(/```json/g, "").replace(/```/g, "").trim();

                // 暴力擷取 JSON 區塊
                const start = raw.indexOf('{');
                const end = raw.lastIndexOf('}');
                if (start === -1 || end === -1) throw new Error("No JSON structure");
                
                const jsonStr = raw.substring(start, end + 1);
                const result = JSON.parse(jsonStr);

                // 更新 UI
                document.getElementById('reading').value = (result.k || "").trim();
                document.getElementById('meaning').value = (result.m || "").trim();
                window.showToast("✅ 翻譯成功");
            } catch(e) { 
                console.error("AI Parse Error:", e);
                window.showToast("❌ 解析失敗，請再點一次"); 
            }
        };

        // --- 以下為原始邏輯補回 ---
        window.switchBook = (b) => { window.currentBook = b; window.selectedLessons = (b==='note'?['個人筆記']:[]); window.renderLessonUI(); window.renderTypeUI(); window.renderList(); };
        window.renderLessonUI = () => {
            const c = document.getElementById('lesson-filter-container');
            document.getElementById('book1-btn').className = `flex-1 border py-2 rounded-xl text-xs font-bold ${window.currentBook===1?'lesson-active':'bg-white text-slate-500'}`;
            document.getElementById('book2-btn').className = `flex-1 border py-2 rounded-xl text-xs font-bold ${window.currentBook===2?'lesson-active':'bg-white text-slate-500'}`;
            document.getElementById('book-note-btn').className = `flex-1 border py-2 rounded-xl text-xs font-bold ${window.currentBook==='note'?'note-active text-white':'bg-white text-slate-500'}`;
            if(window.currentBook==='note') c.innerHTML=""; else c.innerHTML = MAP[window.currentBook].map(l => `<button onclick="window.toggleLesson('${l}')" class="ls-btn-style border rounded-lg px-4 py-1 ${window.selectedLessons.includes(l)?'lesson-active':'bg-white'}">${l}</button>`).join('');
        };
        window.renderTypeUI = () => {
            const types = window.selectedLessons.includes('附錄') ? ['數字', '時間', '量詞'] : ['n.', 'v.', 'adj.', '其他'];
            document.getElementById('type-filter').innerHTML = types.map(x => `<button onclick="window.toggleType('${x}')" class="ls-btn-style border rounded-lg px-3 py-1 ${window.selectedTypes.includes(x)?'type-active':'bg-white'}">${x}</button>`).join('');
        };
        window.toggleLesson = (l) => { const i = window.selectedLessons.indexOf(l); if(i>-1) window.selectedLessons.splice(i,1); else window.selectedLessons.push(l); window.renderLessonUI(); window.renderTypeUI(); window.renderList(); };
        window.toggleType = (t) => { const i = window.selectedTypes.indexOf(t); if(i>-1) window.selectedTypes.splice(i,1); else window.selectedTypes.push(t); window.renderTypeUI(); window.renderList(); };
        window.setNewBookTab = (b) => { window.newBook = b; window.selectedNewL = (b==='note'?'個人筆記':'L1'); window.renderNewUI(); };
        window.renderNewUI = () => {
            document.getElementById('new-book1-tab').className = `flex-1 border py-1.5 rounded-xl text-xs font-bold ${window.newBook===1?'lesson-active':'bg-white'}`;
            document.getElementById('new-book2-tab').className = `flex-1 border py-1.5 rounded-xl text-xs font-bold ${window.newBook===2?'lesson-active':'bg-white'}`;
            document.getElementById('new-note-tab').className = `flex-1 border py-1.5 rounded-xl text-xs font-bold ${window.newBook==='note'?'note-active text-white':'bg-white'}`;
            const c = document.getElementById('new-lesson-container'); if(window.newBook==='note') c.innerHTML=""; else c.innerHTML = MAP[window.newBook].map(l => `<button onclick="window.selectedNewL='${l}';window.renderNewUI();" class="ls-btn-style border rounded-lg px-4 py-1 ${window.selectedNewL===l?'active-new-cat':'bg-white'}">${l}</button>`).join('');
            const cats = (window.selectedNewL==='附錄'?['數字','時間','量詞']:['n.','v.','adj.','其他']);
            document.getElementById('new-category-picker').innerHTML = cats.map(t => `<button onclick="window.selectedNewCat='${t}';window.renderNewUI();" class="ls-btn-style border rounded-lg px-3 py-1 ${window.selectedNewCat===t?'active-new-cat':'bg-white'}">${t}</button>`).join('');
        };
        window.renderList = () => {
            const s = document.getElementById('searchInput').value.toLowerCase();
            let filtered = window.vocabs.filter(v => (v.lesson==='個人筆記'?v.uid===user:!v.uid) && (window.selectedLessons.length===0 || window.selectedLessons.includes(v.lesson)) && (window.selectedTypes.length===0 || window.selectedTypes.includes(v.category)) && (s==="" || v.word.toLowerCase().includes(s) || (v.reading && v.reading.toLowerCase().includes(s)) || v.meaning.toLowerCase().includes(s)));
            filtered.sort((a,b) => { const tA = a.createdAt?.seconds || 0, tB = b.createdAt?.seconds || 0; return window.sortOrder === 'desc' ? tB - tA : tA - tB; });
            document.getElementById('vocab-list').innerHTML = filtered.map(v => `<li class="bg-white p-5 rounded-[32px] flex justify-between shadow-sm border"><div class="flex-1 text-left"><div><span class="bg-indigo-50 text-indigo-500 px-2 py-0.5 rounded text-[9px] uppercase font-black">${v.lesson}</span></div><div class="text-xl font-bold">${v.word}<span class="text-xs text-slate-400 ml-1">【${v.reading||''}】</span></div><div class="text-slate-500 text-xs mt-1 font-bold">${v.meaning}</div></div><div class="flex gap-1"><button onclick="window.speakAction('${v.word}')" class="w-10 h-10 bg-indigo-50 text-indigo-600 rounded-full text-xl">🔊</button><button onclick="window.openEditAction('${v.id}')" class="w-10 h-10 bg-blue-50 text-blue-500 rounded-full text-sm">✏️</button><button onclick="window.deleteWord('${v.id}')" class="w-10 h-10 text-slate-200">✕</button></div></li>`).join('');
        };
        window.submitNewWord = async () => { const w = document.getElementById('word').value.trim(), r = document.getElementById('reading').value.trim(), m = document.getElementById('meaning').value.trim(); if(!w||!m) return alert("不完整"); const d = { word: w, reading: r, meaning: m, lesson: window.selectedNewL, category: window.selectedNewCat, createdAt: new Date() }; if(window.selectedNewL==='個人筆記') d.uid = user; await addDoc(vCol, d); document.getElementById('word').value=""; document.getElementById('reading').value=""; document.getElementById('meaning').value=""; window.showToast("✅ 儲存成功"); };
        window.showToast = (m) => { const t = document.getElementById("toast"); t.innerText = m; t.classList.add("show"); setTimeout(() => t.classList.remove("show"), 2000); };
        window.speakAction = (t) => { window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(t); u.lang='ja-JP'; u.rate=0.5; window.speechSynthesis.speak(u); };
        window.initAudioOnFirstClick = () => { window.speechSynthesis.speak(new SpeechSynthesisUtterance(" ")); };
        window.renderUserHistory = () => { document.getElementById('user-history-list').innerHTML = history.map(n => `<button onclick="localStorage.setItem('jp_user_shared', '${n}'); location.reload();" class="text-[10px] px-2.5 py-0.5 rounded-full font-bold border ${n === user ? 'bg-indigo-600 text-white' : 'bg-white'}">${n}</button>`).join('') + `<button onclick="const n=prompt('使用者:');if(n){history.unshift(n.trim());localStorage.setItem('jp_user_history',JSON.stringify(history.slice(0,8)));localStorage.setItem('jp_user_shared',n.trim());location.reload();}" class="text-[10px] bg-slate-100 px-2.5 py-0.5 rounded-full font-bold border">+ 新增</button>`; };
        onSnapshot(query(vCol, orderBy("createdAt", "desc")), (snap) => { window.vocabs = snap.docs.map(d => ({id:d.id, ...d.data()})); window.renderList(); });
        
        window.renderUserHistory(); window.switchBook(1); window.renderNewUI();
        // 其他彈窗開關邏輯比照辦理...
    </script>
</body>
</html>
