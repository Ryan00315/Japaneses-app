<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kingtex JPNote</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 視覺系統復刻：大圓角與毛玻璃 */
        .rounded-king { border-radius: 32px; }
        .rounded-card { border-radius: 40px; }
        .glass-header { 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(226, 232, 240, 0.8); 
        }
        
        /* 標籤配色 */
        .lesson-active { background-color: #4f46e5 !important; color: white !important; border-color: #4f46e5 !important; box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.2); }
        .type-active { background-color: #ec4899 !important; color: white !important; border-color: #ec4899 !important; box-shadow: 0 4px 6px -1px rgba(236, 72, 153, 0.2); }
        .note-active { background-color: #f97316 !important; color: white !important; border-color: #f97316 !important; }

        /* 卡片翻轉動畫 */
        .card-flip { perspective: 1000px; height: 100%; width: 100%; }
        .card-inner { transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; cursor: pointer; height: 100%; width: 100%; position: relative; }
        .card-inner.is-flipped { transform: rotateY(180deg); }
        .card-front, .card-back { 
            backface-visibility: hidden; 
            position: absolute; 
            inset: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            border-radius: 40px; 
            padding: 2rem; 
        }
        .card-back { transform: rotateY(180deg); }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Toast 動畫 */
        #toast-box { 
            visibility: hidden; 
            opacity: 0; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            transform: translate(-50%, 30px);
        }
        #toast-box.show { 
            visibility: visible; 
            opacity: 1; 
            transform: translate(-50%, 0);
        }

        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-10 font-sans text-slate-900 overflow-x-hidden" onclick="window.initAudio()">

    <!-- Toast 訊息通知 -->
    <div id="toast-box" class="fixed bottom-10 left-1/2 bg-black/80 text-white px-8 py-4 rounded-full font-bold z-[1000] shadow-2xl">✅ 操作成功</div>

    <!-- --- Header (毛玻璃復刻版) --- -->
    <div class="sticky top-0 z-[200] glass-header">
        <div class="max-w-md mx-auto px-4 pt-4 pb-2">
            <!-- 使用者列 -->
            <div class="flex items-center mb-3">
                <div class="flex items-center gap-1.5 overflow-x-auto no-scrollbar flex-1" id="user-list-container"></div>
                <button onclick="window.speakAction('こんにちは')" class="ml-2 text-[9px] bg-yellow-400 text-white px-2.5 py-1 rounded-md font-bold shadow-sm active:scale-90 shrink-0 transition-transform">🔈 測試語音</button>
            </div>

            <!-- 功能按鈕區 -->
            <div class="flex items-center justify-between gap-1 mb-3">
                <h1 class="text-xl font-black text-indigo-600 tracking-tighter shrink-0">Kingtex JPNote</h1>
                <div class="flex items-center gap-1">
                    <button onclick="window.openModal('stats')" class="text-[9px] bg-slate-100 px-2 py-2 rounded-full font-bold active:bg-slate-200 transition-colors">進度</button>
                    <button onclick="window.openModal('import')" class="text-[9px] bg-slate-100 px-2 py-2 rounded-full font-bold active:bg-slate-200 transition-colors">批量</button>
                    <button onclick="window.startQuizSetup()" class="bg-orange-500 text-white px-3 py-1.5 rounded-full text-xs font-bold shadow-lg active:scale-95 transition-all">隨機測試</button>
                </div>
            </div>

            <!-- 冊數分頁 -->
            <div class="flex gap-2 mb-2">
                <button id="tab-b1" onclick="window.switchBook(1)" class="flex-1 py-2 rounded-xl text-xs font-bold border transition-all">第一冊</button>
                <button id="tab-b2" onclick="window.switchBook(2)" class="flex-1 py-2 rounded-xl text-xs font-bold border transition-all">第二冊</button>
                <button id="tab-bn" onclick="window.switchBook('note')" class="flex-1 py-2 rounded-xl text-xs font-bold border transition-all">個人筆記</button>
            </div>

            <!-- 課數篩選器 -->
            <div class="no-scrollbar pb-2 flex gap-2 overflow-x-auto" id="filter-lessons"></div>
            <!-- 分類篩選器 -->
            <div class="no-scrollbar pb-2 flex gap-2 overflow-x-auto" id="filter-types"></div>

            <!-- 搜尋與排序 -->
            <div class="flex gap-2">
                <input type="text" id="main-search" oninput="window.handleSearch(this.value)" class="flex-1 p-3 rounded-2xl bg-white border border-slate-200 outline-none text-sm shadow-inner" placeholder="🔍 搜尋單字庫..."/>
                <button onclick="window.toggleSortOrder()" id="main-sort-btn" class="bg-white border border-slate-200 px-4 rounded-2xl text-[11px] font-bold text-slate-600 active:bg-slate-50 shadow-sm">排序 ↓</button>
            </div>
        </div>
    </div>

    <!-- --- Main Content Area --- -->
    <div class="max-w-md mx-auto p-4">
        <!-- 新增單語按鈕 -->
        <button onclick="window.toggleInput()" id="btn-toggle-input" class="w-full mb-4 py-3.5 rounded-full font-bold border active:scale-95 transition-all shadow-sm bg-indigo-50 text-indigo-600 border-indigo-100">＋ 新增單語</button>

        <!-- 輸入面板 (32px 大圓角) -->
        <section id="panel-input" class="hidden bg-white rounded-king p-5 border border-slate-200 shadow-xl mb-6 space-y-4 fade-in">
            <div class="grid grid-cols-2 gap-3 text-left">
                <input type="text" id="i-word" onblur="window.handleAutoTranslate()" placeholder="單語 (日文)" class="bg-slate-50 p-4 rounded-2xl outline-none text-sm border focus:border-indigo-300" />
                <input type="text" id="i-reading" placeholder="漢字" class="bg-slate-50 p-4 rounded-2xl outline-none text-sm border focus:border-indigo-300" />
            </div>
            <div class="relative text-left">
                <input type="text" id="i-meaning" placeholder="中文意思" class="w-full bg-slate-50 p-4 pr-36 rounded-2xl outline-none text-sm border focus:border-indigo-300 font-bold" />
                <button onclick="window.handleAutoTranslate()" class="absolute right-2 top-2 bottom-2 bg-white text-[10px] px-3 rounded-xl border border-slate-200 font-bold text-slate-500 active:bg-slate-50 shadow-sm">👉 AI 校驗</button>
            </div>
            
            <div class="flex gap-2" id="i-book-tabs"></div>
            <div class="no-scrollbar flex gap-2 overflow-x-auto pb-2" id="i-lesson-list"></div>
            <div class="no-scrollbar flex gap-2 overflow-x-auto pb-4" id="i-cat-list"></div>

            <button id="i-save-btn" onclick="window.saveVocabAction()" class="w-3/4 mx-auto py-3.5 rounded-2xl font-bold shadow-xl block text-sm active:scale-95 transition-all text-white bg-slate-900">儲存到單字冊</button>
        </section>

        <!-- 單字清單容器 -->
        <ul id="vocab-list-main" class="space-y-3 mt-4"></ul>
    </div>

    <!-- --- Modals --- -->

    <!-- Quiz Modal -->
    <div id="modal-quiz" class="fixed inset-0 z-[600] bg-slate-900 flex-col items-center justify-center p-6 text-white hidden">
        <div id="quiz-pre" class="w-full max-w-md">
            <div class="flex justify-between items-center mb-8">
                <button onclick="window.closeModal('quiz')" class="text-indigo-300 font-black py-2 px-4 bg-white/5 rounded-xl">← 返回</button>
                <button onclick="window.closeModal('quiz')" class="text-2xl text-white font-light">✕</button>
            </div>
            <h2 class="text-3xl font-black mb-6 tracking-tighter uppercase text-center">隨機測試</h2>
            <div id="quiz-range-display" class="bg-slate-800 p-6 rounded-king mb-8 text-xs border border-white/10 grid grid-cols-3 gap-2 max-h-48 overflow-y-auto no-scrollbar"></div>
            <div class="flex gap-2 justify-center mb-6">
                <button id="mode-std-btn" onclick="window.setQuizMode('standard')" class="px-4 py-2 rounded-xl text-sm font-bold bg-indigo-600 border border-indigo-600 text-white transition-colors">單字模式</button>
                <button id="mode-hear-btn" onclick="window.setQuizMode('hearing')" class="px-4 py-2 rounded-xl text-sm font-bold bg-slate-800 border border-white/10 text-white/50 transition-colors">聽力模式</button>
            </div>
            <button onclick="window.runQuizLoop()" class="w-full py-6 bg-indigo-600 rounded-king mb-4 font-bold text-xl active:scale-95 shadow-xl transition-all">開始練習</button>
        </div>
        
        <div id="quiz-main" class="w-full max-w-md flex flex-col h-full hidden">
            <div class="flex justify-between items-center mb-8">
                <button onclick="window.backToQuizSetup()" class="text-indigo-300 font-black py-2 px-4 bg-white/5 rounded-xl">← 返回</button>
                <span id="quiz-progress-text" class="text-[10px] text-indigo-400 font-bold bg-white/10 px-4 py-1 rounded-full"></span>
                <button onclick="window.closeModal('quiz')" class="text-2xl">✕</button>
            </div>
            <div class="flex-1 flex items-center justify-center">
                <div onclick="window.flipQuizCard()" class="card-flip w-full h-80 cursor-pointer">
                    <div id="quiz-card-obj" class="card-inner w-full h-full">
                        <div class="card-front bg-indigo-600 shadow-2xl">
                            <p id="q-text-front" class="text-4xl font-black text-center"></p>
                        </div>
                        <div class="card-back bg-white text-slate-900 shadow-2xl">
                            <p id="q-text-word" class="text-indigo-600 font-black text-4xl mb-4 text-center"></p>
                            <p id="q-text-reading" class="text-slate-400 font-bold text-lg mb-2 text-center"></p>
                            <p id="q-text-meaning" class="text-xl font-bold text-slate-500 text-center"></p>
                            <button onclick="event.stopPropagation(); window.speakQuiz()" class="mt-8 bg-slate-100 p-4 rounded-full text-2xl active:scale-90 transition-transform">🔊</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4 mt-8 mb-4">
                <button onclick="window.submitQuiz(false)" class="bg-rose-500 text-white py-6 rounded-king font-black text-xl shadow-lg active:scale-95 transition-all">加強</button>
                <button onclick="window.submitQuiz(true)" class="bg-emerald-500 text-white py-6 rounded-king font-black text-xl shadow-lg active:scale-95 transition-all">下一個</button>
            </div>
        </div>
    </div>

    <!-- Stats Modal -->
    <div id="modal-stats" class="fixed inset-0 z-[600] bg-black/60 backdrop-blur-sm flex-col items-center justify-center p-4 hidden" onclick="window.closeModal('stats')">
        <div class="bg-white w-full max-w-md rounded-card p-8 shadow-2xl space-y-4" onclick="event.stopPropagation()">
            <h2 class="text-xl font-black text-indigo-600 text-center uppercase tracking-tighter">個人弱點排行</h2>
            <div id="stats-list-container" class="max-h-96 overflow-y-auto space-y-2 pr-2 no-scrollbar"></div>
            <button onclick="window.closeModal('stats')" class="w-full py-4 bg-slate-100 text-slate-600 rounded-[24px] font-bold active:bg-slate-200 transition-colors">關閉</button>
        </div>
    </div>

    <!-- Import Modal -->
    <div id="modal-import" class="fixed inset-0 z-[600] bg-black/80 backdrop-blur-sm flex-col items-center justify-center p-4 hidden" onclick="window.closeModal('import')">
        <div class="bg-slate-900 w-full max-w-md p-8 rounded-card text-white space-y-4" onclick="event.stopPropagation()">
            <h3 class="text-xl font-bold uppercase tracking-tight">批量匯入單字</h3>
            <p class="text-[10px] text-slate-400 italic">格式範例：單語,漢字,意思,詞性,課數</p>
            <textarea id="import-text-area" rows="8" class="w-full bg-slate-800 rounded-king p-5 text-xs font-mono outline-none border border-white/10 focus:border-indigo-500 transition-colors" placeholder="たべます,食べます,吃,v.,L1"></textarea>
            <div class="flex gap-2 mt-4">
                <button onclick="window.closeModal('import')" class="flex-1 py-4 bg-slate-700 rounded-xl font-bold active:bg-slate-600 transition-colors">取消</button>
                <button onclick="window.executeImport()" class="flex-1 py-4 bg-indigo-600 rounded-xl font-bold shadow-lg active:scale-95 transition-all">開始同步</button>
            </div>
        </div>
    </div>

    <!-- JS Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, setDoc, deleteDoc, writeBatch, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        // --- 核心設定 (內嵌金鑰以相容 GitHub，解決 configuration-not-found 錯誤) ---
        const firebaseConfig = {
            apiKey: "AIzaSyDOsqjX7FknZOKTdEUiofhIwIwGVRUIdN4",
            authDomain: "jpnote-5f436.firebaseapp.com",
            projectId: "jpnote-5f436",
            storageBucket: "jpnote-5f436.firebasestorage.app",
            messagingSenderId: "881660892658",
            appId: "1:881660892658:web:9d88f9b2332aa9e2b3076b"
        };
        const GEMINI_API_KEY = "AIzaSyDb7BA3Ikwz33KKjJgrzrc1afHIoGj7q94";
        const APP_NAMESPACE = 'kingtex-jpnote-final';

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- 核心狀態管理 ---
        let currentVocabs = [];
        let currentProgress = {};
        let currentUser = null;
        let localUserName = localStorage.getItem('jp_user_shared') || '訪客';
        let userHistory = JSON.parse(localStorage.getItem('jp_user_history') || '["訪客"]');

        let filterBook = 1;
        let activeLessons = [];
        let activeTypes = [];
        let searchQuery = '';
        let listSortOrder = 'desc';

        let editId = null;
        let inputState = { book: 1, lesson: '未分類', category: 'n.' };

        const BOOK_MAP = {
            1: ["附錄", "未分類", "L1", "L2", "L3", "L4", "L5", "L6", "L7", "L8", "L9", "L10", "L11", "L12"],
            2: ["L13", "L14", "L15", "L16", "L17", "L18", "L19", "L20", "L21", "L22", "L23", "L24", "L25"],
            'note': ["個人筆記"]
        };
        const APP_LIST = ['數字', '星期', '時候', '時刻', '時間', '期間', '量詞'];
        const CAT_LIST = ['n.', 'v.', 'adj.', '會話', '練習C', '關聯單語', '其他'];

        // --- 1. 初始化 Auth 與 防呆監聽 ---
        document.addEventListener("DOMContentLoaded", () => {
            renderEverything(); // 預先渲染外殼
            
            signInAnonymously(auth).catch(err => {
                console.error("Auth Failed:", err);
                showToastMsg("網路異常，請重新整理");
            });

            onAuthStateChanged(auth, u => {
                if (u) {
                    currentUser = u;
                    const vRef = collection(db, 'artifacts', APP_NAMESPACE, 'public', 'data', 'vocabs');
                    onSnapshot(vRef, snap => {
                        currentVocabs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                        renderList();
                    });
                    
                    const pRef = collection(db, 'artifacts', APP_NAMESPACE, 'users', u.uid, 'progress');
                    onSnapshot(pRef, snap => {
                        currentProgress = {};
                        snap.docs.forEach(d => currentProgress[d.data().vocabId] = d.data());
                        renderList();
                        if(document.getElementById('modal-stats')?.classList.contains('flex')) renderStatsData();
                    });
                }
            });
        });

        // --- 2. 恢復「有時會出現英文」的 AI 翻譯引擎 ---
        let translating = false;
        window.handleAutoTranslate = async () => {
            const wordEl = document.getElementById('i-word');
            const meaningEl = document.getElementById('i-meaning');
            const readingEl = document.getElementById('i-reading');
            
            // 安全防護
            if(!wordEl || !meaningEl || !readingEl) return;
            
            const text = wordEl.value.trim();
            if (!text || translating) return;
            
            translating = true;
            meaningEl.placeholder = "🔍 正在翻譯...";

            // 字典級硬修正
            const hardDict = { "たべます": ["吃", "食べます"], "いきます": ["去", "行きます"], "きます": ["來", "来ます"] };
            if(hardDict[text]) {
                meaningEl.value = hardDict[text][0];
                readingEl.value = hardDict[text][1];
                translating = false;
                meaningEl.placeholder = "中文意思";
                return;
            }

            try {
                // 使用原版較為靈活的 Prompt
                const prompt = `Translate the word '${text}'. Return JSON strictly: {"m":"meaning", "k":"kanji"}`;
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await res.json();
                const raw = data.candidates?.[0]?.content?.parts?.[0]?.text;
                if (raw) {
                    const jsonStr = raw.match(/\{.*\}/s)?.[0];
                    if(jsonStr) {
                        const parsed = JSON.parse(jsonStr);
                        meaningEl.value = parsed.m;
                        readingEl.value = parsed.k || "";
                    }
                }
            } catch (e) {
                console.warn("AI Err, Fallback to Google");
                const gUrl = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=ja&tl=zh-TW&dt=t&q=${encodeURIComponent(text)}`;
                fetch(gUrl).then(r => r.json()).then(g => {
                    if(g?.[0]?.[0]?.[0]) {
                        const cleanG = g[0][0][0].replace(/[我要會正在進行了]/g, "");
                        meaningEl.value = cleanG;
                    }
                });
            } finally { 
                translating = false; 
                meaningEl.placeholder = "中文意思"; 
            }
        };

        // --- 3. UI 渲染 ---
        function renderEverything() {
            renderUserBar();
            renderFilters();
            renderList();
            updateBookTabs();
            if(!document.getElementById('panel-input')?.classList.contains('hidden')) {
                renderInputTabs();
            }
        }

        function renderUserBar() {
            const container = document.getElementById('user-list-container');
            if(!container) return; // 防呆設計，解決 innerHTML null 報錯
            container.innerHTML = userHistory.map(n => 
                `<button onclick="window.switchUser('${n}')" class="text-[10px] px-2.5 py-1 rounded-full font-bold border shrink-0 transition-all ${n === localUserName ? 'bg-indigo-600 text-white border-indigo-600' : 'bg-white text-slate-500 border-slate-200'}">${n}</button>`
            ).join('') + `<button onclick="window.addNewUser()" class="text-[10px] bg-slate-100 px-2.5 py-1 rounded-full font-bold border border-slate-200 shrink-0 active:scale-95 transition-transform">+ 新增</button>`;
        }

        function updateBookTabs() {
            const b1 = document.getElementById('tab-b1'), b2 = document.getElementById('tab-b2'), bn = document.getElementById('tab-bn');
            if(!b1 || !b2 || !bn) return;
            b1.className = `flex-1 py-2 rounded-xl text-xs font-bold border transition-all ${filterBook == 1 ? 'lesson-active' : 'bg-white text-slate-500 border-slate-200'}`;
            b2.className = `flex-1 py-2 rounded-xl text-xs font-bold border transition-all ${filterBook == 2 ? 'lesson-active' : 'bg-white text-slate-500 border-slate-200'}`;
            bn.className = `flex-1 py-2 rounded-xl text-xs font-bold border transition-all ${filterBook == 'note' ? 'note-active' : 'bg-white text-slate-500 border-slate-200'}`;
        }

        function renderFilters() {
            const lC = document.getElementById('filter-lessons');
            const tC = document.getElementById('filter-types');
            if(!lC || !tC) return;

            if(filterBook === 'note') { lC.innerHTML = ''; } 
            else {
                lC.innerHTML = BOOK_MAP[filterBook].map(l => `<button onclick="window.toggleLessonFilter('${l}')" class="text-[11px] px-4 py-1.5 rounded-lg font-bold border whitespace-nowrap transition-all ${activeLessons.includes(l) ? 'lesson-active' : 'bg-white text-slate-400 border-slate-200'}">${l}</button>`).join('');
            }
            const currentCats = activeLessons.includes('附錄') ? APP_LIST : CAT_LIST;
            tC.innerHTML = currentCats.map(t => `<button onclick="window.toggleTypeFilter('${t}')" class="text-[11px] px-4 py-1.5 rounded-lg font-bold border whitespace-nowrap transition-all ${activeTypes.includes(t) ? 'type-active' : 'bg-white text-slate-400 border-slate-200'}">${t}</button>`).join('');
        }

        function renderList() {
            const container = document.getElementById('vocab-list-main');
            if(!container) return;

            const filtered = currentVocabs.filter(v => {
                const bookMatches = filterBook === 'note' ? v.lesson === '個人筆記' : (filterBook == 1 ? BOOK_MAP[1].includes(v.lesson) : BOOK_MAP[2].includes(v.lesson));
                if(v.lesson === '個人筆記' && v.userName !== localUserName) return false;
                const lessonMatches = activeLessons.length === 0 || activeLessons.includes(v.lesson);
                const typeMatches = activeTypes.length === 0 || activeTypes.includes(v.category);
                const searchStr = searchQuery.toLowerCase();
                const searchMatches = v.word.toLowerCase().includes(searchStr) || v.meaning.toLowerCase().includes(searchStr) || (v.reading && v.reading.toLowerCase().includes(searchStr));
                return bookMatches && lessonMatches && typeMatches && searchMatches;
            }).sort((a,b) => {
                const tA = a.createdAt?.seconds || 0; const tB = b.createdAt?.seconds || 0;
                return listSortOrder === 'desc' ? tB - tA : tA - tB;
            });

            container.innerHTML = filtered.map(v => {
                const wrong = currentProgress[v.id]?.wrongCount || 0;
                return `<li class="bg-white p-5 rounded-king border border-slate-100 shadow-sm flex items-center justify-between transition-all hover:shadow-md fade-in">
                    <div class="flex-1 pr-4 text-left">
                        <div class="flex gap-1.5 mb-1 flex-wrap">
                            <span class="${v.lesson === '個人筆記' ? 'bg-orange-50 text-orange-500' : 'bg-indigo-50 text-indigo-500'} px-2 py-0.5 rounded-md text-[9px] font-black uppercase">${v.lesson}</span>
                            <span class="bg-pink-50 text-pink-500 px-2 py-0.5 rounded-md text-[9px] font-black uppercase">${v.category}</span>
                            ${wrong > 0 ? `<span class="bg-rose-50 text-rose-500 px-2 py-0.5 rounded-full text-[9px] font-bold">錯 ${wrong} 次</span>` : ''}
                        </div>
                        <div class="text-xl font-bold text-slate-800">${v.word} ${v.reading ? `<span class="text-xs text-slate-400 font-normal ml-1">【${v.reading}】</span>` : ''}</div>
                        <div class="text-slate-500 text-xs mt-1 font-bold">${v.meaning}</div>
                    </div>
                    <div class="flex gap-1">
                        <button onclick="window.speakAction('${v.word}')" class="w-10 h-10 flex items-center justify-center bg-indigo-50 text-indigo-600 rounded-full text-xl active:scale-90 transition-transform">🔊</button>
                        <button onclick="window.editVocab('${v.id}')" class="w-10 h-10 flex items-center justify-center bg-blue-50 text-blue-500 rounded-full text-sm active:scale-90 transition-transform">✏️</button>
                        <button onclick="window.deleteVocab('${v.id}')" class="w-10 h-10 flex items-center justify-center text-slate-200 hover:text-rose-400 active:scale-90 transition-colors">✕</button>
                    </div>
                </li>`;
            }).join('');
        }

        // --- 功能交互控制 ---
        window.switchBook = b => { filterBook = b; activeLessons = []; renderEverything(); };
        window.toggleLessonFilter = l => { if(activeLessons.includes(l)) activeLessons = activeLessons.filter(x => x!==l); else activeLessons.push(l); renderEverything(); };
        window.toggleTypeFilter = t => { if(activeTypes.includes(t)) activeTypes = activeTypes.filter(x => x!==t); else activeTypes.push(t); renderEverything(); };
        window.handleSearch = v => { searchQuery = v; renderList(); };
        window.toggleSortOrder = () => { listSortOrder = listSortOrder === 'desc' ? 'asc' : 'desc'; document.getElementById('main-sort-btn').innerText = `排序 ${listSortOrder === 'desc' ? '↓' : '↑'}`; renderList(); };

        window.toggleInput = () => {
            const panel = document.getElementById('panel-input');
            const btn = document.getElementById('btn-toggle-input');
            if(!panel || !btn) return;

            if(panel.classList.contains('hidden')) {
                panel.classList.remove('hidden');
                btn.innerText = '✕ 關閉輸入';
                btn.className = 'w-full mb-4 py-3.5 rounded-full font-bold border active:scale-95 transition-all shadow-sm bg-slate-100 text-slate-500 border-slate-200';
                renderInputTabs();
            } else {
                panel.classList.add('hidden');
                btn.innerText = '＋ 新增單語';
                btn.className = 'w-full mb-4 py-3.5 rounded-full font-bold border active:scale-95 transition-all shadow-sm bg-indigo-50 text-indigo-600 border-indigo-100';
                editId = null;
                resetInput();
            }
        };

        function renderInputTabs() {
            const bTabs = document.getElementById('i-book-tabs');
            if(bTabs) bTabs.innerHTML = [1, 2, 'note'].map(b => `<button onclick="window.setInBook('${b}')" class="flex-1 border py-1.5 rounded-xl text-xs font-bold transition-all ${inputState.book == b ? (b === 'note' ? 'note-active' : 'lesson-active') : 'bg-white text-slate-400 border-slate-200'}">${b === 'note' ? '個人' : '第 '+b+' 冊'}</button>`).join('');
            
            const lC = document.getElementById('i-lesson-list');
            if(lC) {
                if(inputState.book === 'note') lC.innerHTML = '';
                else lC.innerHTML = BOOK_MAP[inputState.book].map(l => `<button onclick="window.setInLesson('${l}')" class="text-[11px] px-4 py-1.5 rounded-lg font-bold border whitespace-nowrap transition-all ${inputState.lesson === l ? 'lesson-active border-indigo-600 shadow-md' : 'bg-white text-slate-400 border-slate-200'}">${l}</button>`).join('');
            }
            
            const cC = document.getElementById('i-cat-list');
            if(cC) {
                const activeCats = inputState.lesson === '附錄' ? APP_LIST : CAT_LIST;
                cC.innerHTML = activeCats.map(c => `<button onclick="window.setInCat('${c}')" class="text-[11px] px-4 py-1.5 rounded-lg font-bold border whitespace-nowrap transition-all ${inputState.category === c ? 'type-active border-pink-500 shadow-md' : 'bg-white text-slate-400 border-slate-200'}">${c}</button>`).join('');
            }
        }

        window.setInBook = b => { inputState.book = b; inputState.lesson = b === 'note' ? '個人筆記' : (b == 1 ? '附錄' : 'L13'); inputState.category = inputState.lesson === '附錄' ? '數字' : 'n.'; renderInputTabs(); };
        window.setInLesson = l => { inputState.lesson = l; inputState.category = l === '附錄' ? '數字' : 'n.'; renderInputTabs(); };
        window.setInCat = c => { inputState.category = c; renderInputTabs(); };

        window.saveVocabAction = async () => {
            const w = document.getElementById('i-word').value.trim();
            const r = document.getElementById('i-reading').value.trim();
            const m = document.getElementById('i-meaning').value.trim();
            if(!w || !m || !currentUser) return showToastMsg("⚠️ 內容不完整或尚未連線");

            const data = { word: w, reading: r, meaning: m, lesson: inputState.lesson, category: inputState.category, createdAt: serverTimestamp(), userId: currentUser.uid, userName: localUserName };
            try {
                if(editId) {
                    await updateDoc(doc(db, 'artifacts', APP_NAMESPACE, 'public', 'data', 'vocabs', editId), data);
                    showToastMsg("✅ 已更新");
                } else {
                    await addDoc(collection(db, 'artifacts', APP_NAMESPACE, 'public', 'data', 'vocabs'), data);
                    showToastMsg("✅ 已儲存");
                }
                window.toggleInput();
            } catch (err) {
                console.error("Save Error:", err);
                showToastMsg("❌ 儲存失敗");
            }
        };

        window.editVocab = id => {
            const v = currentVocabs.find(x => x.id === id);
            if(v) {
                editId = id;
                inputState = { book: v.lesson === '個人筆記' ? 'note' : (BOOK_MAP[1].includes(v.lesson) ? 1 : 2), lesson: v.lesson, category: v.category || 'n.' };
                if(document.getElementById('panel-input')?.classList.contains('hidden')) window.toggleInput();
                else renderInputTabs();
                
                document.getElementById('i-word').value = v.word;
                document.getElementById('i-reading').value = v.reading || '';
                document.getElementById('i-meaning').value = v.meaning;
                document.getElementById('i-save-btn').innerText = '更新保存';
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        };

        window.deleteVocab = async id => { if(confirm("確定刪除？")) await deleteDoc(doc(db, 'artifacts', APP_NAMESPACE, 'public', 'data', 'vocabs', id)); };

        // --- Modals ---
        window.openModal = m => {
            const el = document.getElementById(`modal-${m}`);
            if(!el) return;
            el.classList.remove('hidden'); el.classList.add('flex');
            if(m === 'stats') renderStatsData();
        };
        window.closeModal = m => {
            const el = document.getElementById(`modal-${m}`);
            if(!el) return;
            el.classList.add('hidden'); el.classList.remove('flex');
        };

        function renderStatsData() {
            const list = Object.values(currentProgress).filter(p => p.wrongCount > 0).sort((a,b) => b.wrongCount - a.wrongCount).slice(0, 15);
            const container = document.getElementById('stats-list-container');
            if(!container) return;
            container.innerHTML = list.map(p => {
                const v = currentVocabs.find(x => x.id === p.vocabId);
                return v ? `<div class="flex justify-between items-center border-b border-slate-100 py-3 font-bold"><div class="text-left"><div class="text-slate-800">${v.word}</div><div class="text-[9px] text-indigo-400 uppercase font-black">${v.lesson}</div></div><span class="text-rose-500 bg-rose-50 px-3 py-1 rounded-full text-xs font-black italic">錯 ${p.wrongCount} 次</span></div>` : '';
            }).join('') || '<p class="text-center py-8 text-slate-400 font-bold">尚無錯誤紀錄</p>';
        }

        window.executeImport = async () => {
            const text = document.getElementById('import-text-area').value.trim();
            if(!text || !currentUser) return;
            const batch = writeBatch(db);
            text.split('\n').forEach(line => {
                const [w, r, m, c, l] = line.split(',').map(s => s?.trim());
                if(w && m) {
                    const dRef = doc(collection(db, 'artifacts', APP_NAMESPACE, 'public', 'data', 'vocabs'));
                    batch.set(dRef, { word: w, reading: r || '', meaning: m, category: c || 'n.', lesson: l || '未分類', createdAt: serverTimestamp(), userId: currentUser.uid, userName: localUserName });
                }
            });
            await batch.commit(); window.closeModal('import'); showToastMsg("✅ 批量匯入成功");
            document.getElementById('import-text-area').value = '';
        };

        // --- Quiz ---
        let quizPool = []; let quizIdx = 0; let flipped = false; let currentQuizMode = 'standard';
        
        window.startQuizSetup = () => {
            quizPool = currentVocabs.filter(v => {
                if(filterBook === 'note') return v.lesson === '個人筆記' && v.userName === localUserName;
                const lessonMatch = activeLessons.length === 0 || activeLessons.includes(v.lesson);
                return lessonMatch && v.lesson !== '個人筆記';
            }).sort(() => Math.random() - 0.5);
            
            if(!quizPool.length) return showToastMsg("⚠️ 範圍內無單字");
            
            const rangeDisplay = document.getElementById('quiz-range-display');
            if(rangeDisplay) rangeDisplay.innerHTML = (activeLessons.length ? activeLessons : ["全部"]).map(l => `<div class="bg-white/10 p-2 rounded-lg text-indigo-300 text-center font-bold">${l}</div>`).join('');
            
            document.getElementById('quiz-pre').classList.remove('hidden');
            document.getElementById('quiz-main').classList.add('hidden');
            window.openModal('quiz');
        };

        window.setQuizMode = m => {
            currentQuizMode = m;
            document.getElementById('mode-std-btn').className = `px-4 py-2 rounded-xl text-sm font-bold border transition-colors ${m==='standard'?'bg-indigo-600 border-indigo-600 text-white':'bg-slate-800 border-white/10 text-white/50'}`;
            document.getElementById('mode-hear-btn').className = `px-4 py-2 rounded-xl text-sm font-bold border transition-colors ${m==='hearing'?'bg-indigo-600 border-indigo-600 text-white':'bg-slate-800 border-white/10 text-white/50'}`;
        };

        window.runQuizLoop = () => {
            quizIdx = 0; flipped = false;
            document.getElementById('quiz-pre').classList.add('hidden');
            document.getElementById('quiz-main').classList.remove('hidden');
            renderQuizItem();
        };

        function renderQuizItem() {
            if(quizIdx >= quizPool.length) { window.closeModal('quiz'); return showToastMsg("🎉 測驗完成"); }
            const w = quizPool[quizIdx];
            flipped = false;
            document.getElementById('quiz-card-obj').classList.remove('is-flipped');
            document.getElementById('q-text-front').innerText = currentQuizMode === 'standard' ? w.meaning : "🎧";
            document.getElementById('q-text-word').innerText = w.word;
            document.getElementById('q-text-reading').innerText = w.reading || "";
            document.getElementById('q-text-meaning').innerText = w.meaning;
            document.getElementById('quiz-progress-text').innerText = `剩：${quizPool.length - quizIdx} 題`;
            
            if(currentQuizMode === 'hearing') window.speakAction(w.word);
        }

        window.flipQuizCard = () => { 
            flipped = !flipped; 
            document.getElementById('quiz-card-obj').classList.toggle('is-flipped', flipped); 
            if(flipped) window.speakAction(quizPool[quizIdx].word); 
        };

        window.submitQuiz = async correct => {
            if(!currentUser) return;
            const w = quizPool[quizIdx];
            const pRef = doc(collection(db, 'artifacts', APP_NAMESPACE, 'users', currentUser.uid, 'progress'), `${currentUser.uid}_${w.id}`);
            const ex = currentProgress[w.id] || { wrongCount: 0 };
            await setDoc(pRef, { vocabId: w.id, wrongCount: correct ? ex.wrongCount : (ex.wrongCount + 1), lastTested: serverTimestamp() });
            quizIdx++; renderQuizItem();
        };

        window.backToQuizSetup = () => { document.getElementById('quiz-main').classList.add('hidden'); document.getElementById('quiz-pre').classList.remove('hidden'); };
        window.speakQuiz = () => window.speakAction(quizPool[quizIdx].word);

        // --- Utils ---
        window.switchUser = n => { localStorage.setItem('jp_user_shared', n); location.reload(); };
        window.addNewUser = () => { const n = prompt("使用者名稱:"); if(n && n.trim()){ userHistory.unshift(n.trim()); localStorage.setItem('jp_user_history', JSON.stringify(userHistory.slice(0,8))); window.switchUser(n.trim()); } };
        window.speakAction = t => { window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(t); u.lang='ja-JP'; u.rate=0.8; window.speechSynthesis.speak(u); };
        let audioOk = false; window.initAudio = () => { if(!audioOk){ window.speechSynthesis.speak(new SpeechSynthesisUtterance(" ")); audioOk = true; } };
        function showToastMsg(m) { const b = document.getElementById('toast-box'); if(b){ b.innerText = m; b.classList.add('show'); setTimeout(()=>b.classList.remove('show'), 2000); } }
        function resetInput() {
            document.getElementById('i-word').value = ''; document.getElementById('i-reading').value = ''; document.getElementById('i-meaning').value = '';
            document.getElementById('i-save-btn').innerText = '儲存到單字冊';
        }

    </script>
</body>
</html>
